<!doctype html>
<html lang="de">

<head>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <title>Hotel Belegungsplan</title>

  <style>
    html {
      -webkit-text-size-adjust: 100%;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
    }

    body {
      overflow-x: hidden;
    }

    body {
      font-family: Arial;
      cursor: default;
      margin: 0;
      position: relative;
      z-index: 0;
    }

    #controls {
      top: 10px;
      left: 20px;
      padding: 10px;
      position: relative;
      background: #fff;
    }

    table {
      border-collapse: collapse;
      border-spacing: 0;
      width: 100%;
      position: relative;
    }

    th,
    td {
      border: 1px solid #ccc;
      position: relative;
      height: 25px;
      overflow: visible;
    }

    thead {
      position: relative;
      z-index: 2001 !important;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 120px;
      font-size: 20px;
      z-index: 2000 !important;
      background: #eee;
    }

    thead th:not(:last-child)::before {
      content: "";
      position: absolute;

      top: 0;
      right: -1px;
      width: 2px;
      height: 100%;

      background: #666;

      z-index: 2001;
      /* ✅ ÜBER ALLEM */
      pointer-events: none;
    }

    th {
      background: transparent;
      pointer-events: auto;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    td {
      pointer-events: auto;
    }

    .room {
      width: 180px;
      height: 40px;
      background: #fafafa;
      pointer-events: auto;
      z-index: 1;
      position: relative;
    }

    body.select-mode {
      cursor: crosshair !important;
    }

    body.select-mode .booking,
    body.select-mode .booking * {
      cursor: crosshair !important;
    }

    #controls button {
      font-size: 18px;
      padding: 2px 4px;
      border-radius: 10px;
      background: #e6e5e5;
      border-color: rgba(0, 0, 0, 0.445);
      color: #000000;
    }

    .half::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      border-left: 1px dashed #bbb;
    }

    .half {
      pointer-events: auto;
    }

    .booking {
      position: absolute;
      top: 3px;
      bottom: 3px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      font-size: 18px;
      gap: 4px;
      overflow: hidden;
      pointer-events: auto;
      padding: 0 4px;
      padding-left: 4px;
      z-index: 100;
      transition: padding-left 0.2s ease;
      will-change: transform;
      pointer-events: auto;
    }

    body:not(.logged-in) #stickyHeader {
      display: none !important;
    }

    body:not(.logged-in) #calendar {
      pointer-events: none;
      filter: blur(2px);
      opacity: 0.6;
    }

    td.blocked {
      background: #eee !important;
      opacity: 0.6;
    }

    #bookingTitle,
    #groupInfoTitle,
    #logOverviewTitle,
    #formTitle {
      font-size: 25px;
    }


    #bookingForm input,
    #bookingForm select,
    #bookingForm textarea,
    #infoContent,
    #groupInfoBox,
    #logOverview,
    #groupForm,
    #singleForm {
      font-size: 18px;
    }

    .booking-layer {
      position: absolute;
      top: 0;

      left: 180px;
      right: 0;
      width: auto;

      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .booking.block {
      background: repeating-linear-gradient(45deg, #444, #444 10px, #666 10px, #666 20px);
      color: white;
      font-weight: bold;
    }

    .booking .text {
      flex: 1;
      min-width: 0;
      max-width: calc(100% - 30px);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      transition: transform 0.2s ease;
    }

    .booking:hover .text {
      transform: translateX(95px);
      /* Platz für Flags + Handle */
    }

    .flags {
      display: flex;
      gap: 4px;
      margin-right: 6px;
    }

    .no-breakfast-icon {
      position: relative;
      display: inline-block;
      width: 24px;
      height: 24px;
      margin-right: 4px;
      vertical-align: middle;
    }

    .no-breakfast-icon span {
      position: relative;
      top: 0;
      left: 0;
      font-size: 20px;
      line-height: 16px;
    }

    .auth-only {
      display: none !important;
    }

    /* ✅ wenn eingeloggt */

    body.logged-in .auth-only:not(.admin-only) {
      display: inline-block !important;
    }

    .admin-only {
      display: none !important;
    }

    body.admin .admin-only {
      display: inline-block !important;
    }

    #datePickerWrapper {
      display: none !important;
    }

    body.logged-in #datePickerWrapper {
      display: inline-block !important;
    }

    .no-breakfast-icon::after {
      content: "";
      position: absolute;

      top: 7px;
      /* 👈 weiter nach unten */
      left: 1px;

      width: 25px;
      /* 👈 etwas länger */
      height: 2px;

      background: rgb(255, 0, 0);

      transform: rotate(-45deg);
      transform-origin: center;
    }

    .flag {
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      border-radius: 4px;
      cursor: pointer;

      /* ✅ Box immer sichtbar */
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(0, 0, 0, 0.6);

      /* ✅ Standard = ausgegraut */
      color: rgba(0, 0, 0, 0.3);
    }

    /* ✅ Aktiv */
    .flag:not(.off) {
      color: black;
    }

    .move-blocked {
      opacity: 0.3 !important;
      background: #ddd !important;
    }

    /* optional: Hover schöner */
    .flag:hover {
      transform: scale(1.1);
    }

    .booking .flags,
    .booking .drag-handle {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    .booking .flags {
      position: absolute;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      gap: 4px;
    }

    .booking .drag-handle {
      position: absolute;
      left: 55px;
      /* 👈 Abstand NACH den Flags */
      top: 50%;
      transform: translateY(-50%);
    }

    .booking.checked-in {
      background-image: repeating-linear-gradient(135deg,
          rgba(0, 0, 0, 0.4),
          rgba(0, 0, 0, 0.4) 2px,
          transparent 6px,
          transparent 12px);

      background-blend-mode: multiply;
    }

    .paid-icon {
      position: relative;

      z-index: 2;
      /* WICHTIG → über dem Overlay */
    }

    /* ✅ Hover: sichtbar */
    .booking:hover .flags,
    .booking:hover .drag-handle {
      opacity: 1 !important;
      pointer-events: auto !important;
    }

    td.blocked {
      background: #ddd !important;
      cursor: not-allowed !important;
    }

    .handle {
      position: absolute;
      top: 0;
      bottom: 0;
      opacity: 0.6;
      width: 3px;
      background: rgba(0, 0, 0, 0.5);
      cursor: ew-resize;
      z-index: 200;
      pointer-events: auto;
    }

    .handle:hover {
      opacity: 1;
    }

    .drag-handle {
      cursor: grab;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .move-handle {
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      font-size: 12px;
    }

    tr {
      position: relative;
    }

    .handle.right {
      right: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .handle.left {
      left: 0;
      background: rgba(0, 0, 0, 0.5);
    }

    .selected {
      background: black !important;
      color: white !important;
      opacity: 1 !important;
      border: 2px solid white;
    }

    .selected .text,
    .selected .price {
      color: white !important;
    }

    #palette {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      padding: 10px;
      border: 1px solid #ccc;
      display: none;
      z-index: 15000;
    }

    #palette div {
      width: 28px;
      height: 28px;
      display: inline-block;
      margin: 4px;
      cursor: pointer;
    }

    #legend {
      padding: 10px;
      font-size: 20px;
      background: #fff;
    }

    .booking .price {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      pointer-events: none;
      z-index: 10;
    }

    .switch-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 18px;
    }

    /* Switch */
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #bbb;
      transition: 0.2s;
      border-radius: 24px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.2s;
      border-radius: 50%;
    }

    input:checked+.slider {
      background-color: #2196f3;
    }

    input:checked+.slider:before {
      transform: translateX(20px);
    }

    body.readonly .booking {
      pointer-events: none;
    }

    body.readonly .booking.allowed {
      pointer-events: auto;
    }

    body.readonly button:not(.allowed),
    body.readonly input:not(.allowed) {
      display: none !important;
    }

    #backupList button {
      width: 100%;
      margin-bottom: 6px;
    }

    #backupList::-webkit-scrollbar {
      width: 8px;
    }

    #datePickerWrapper {
      position: relative;
      display: inline-block;
    }

    #datePickerWrapper input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    #datePickerWrapper label {
      display: inline-block;
      width: 44px;
      height: 44px;

      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;

      text-align: center;
      line-height: 44px;
      font-size: 20px;

      cursor: pointer;
    }

    #loginBlocker {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;

      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);

      z-index: 10000;

      display: none;
    }

    /* ✅ wenn NICHT eingeloggt */
    body:not(.logged-in) #loginBlocker {
      display: block;
    }

    body:not(.logged-in) {
      overflow: hidden;
      height: 100vh;
    }

    #loginBox {
      position: fixed;
      z-index: 99999;
      width: min(90vw, 320px);
      max-width: 320px;
      box-sizing: border-box;
    }

    #loginBox input,
    #loginBox button {
      width: 100%;
      box-sizing: border-box;
    }

    #stickyHeader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 12000;
      background: white;
    }

    #stickyHeader {
      height: 120px;
      /* evtl. anpassen */
    }

    /* ✅ Kalender korrekt runter schieben */
    #calendar {
      margin-top: 120px;
    }

    #calendar td {
      border-right: 2px solid #4e4e4e;
    }

    #calendar td:last-child {
      border-right: none;
    }

    #topRightButtons {
      position: absolute;
      top: 10px;
      right: 20px;
      display: flex;
      gap: 12px;
    }

    .icons {
      font-size: 20px;
    }

    #lowerTopRightButtons {
      position: absolute;
      top: 50px;
      right: 20px;
      display: flex;
      gap: 12px;
    }

    body.moving .booking:hover .flags,
    body.moving .booking:hover .drag-handle,
    body.moving .booking:hover .move-handle {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    body.moving .booking:hover .text {
      transform: none !important;
    }

    #swipeBackground {
      position: fixed;
      inset: 0;

      display: flex;
      align-items: center;

      font-size: 40px;
      font-weight: bold;

      color: black;

      z-index: 15000;
      pointer-events: none;

      overflow: hidden;
    }

    /* 👉 Text Element */
    #swipeBackground span {
      position: absolute;
      white-space: nowrap;
      transition: transform 0.1s linear;
    }

    #logContent::-webkit-scrollbar {
      width: 6px;
    }

    #logContent::-webkit-scrollbar-thumb,
    #backupList::-webkit-scrollbar-thumb {
      background: #bbb;
      border-radius: 4px;
    }

    @media (max-width: 600px) {
      /* ✅ HEADER */


      #singleForm button,
      #groupForm button {
        font-size: 35px !important;
        padding: 12px 20px !important;
      }


      .switch-wrapper {
        transform: scale(2);
      }

      thead th {
        font-size: 26px !important;
        line-height: 1.2;
        padding: 10px 4px;
        height: 80px;
      }

      thead th:not(:last-child)::before {
        width: 2px;
      }

      /* ✅ ZIMMER SPALTE */
      .room {
        position: sticky;
        left: 0;
        height: 40px !important;
        width: 65px;
        min-width: 65px;
        max-width: 65px;

        background: #fafafa;
        z-index: 1999;

        font-size: 0;
        text-align: center;
      }


      .booking:hover .flags,
      .booking:hover .drag-handle,
      .booking:hover .move-handle {
        opacity: 0 !important;
        pointer-events: none !important;
      }

      .booking:hover .text {
        transform: none !important;
      }


      .icons {
        font-size: 32px;
        /* 👈 hier kannst du spielen */
      }

      .room::after {
        content: attr(data-room-number);
        font-size: 24px;
        font-weight: bold;
      }

      #calendar {
        margin-top: 84px;
      }

      /* ✅ ZELLEN */
      #calendar td {
        height: 55px;
      }

      /* ✅ BOOKINGS */
      .booking {
        font-size: 25px;
        border-radius: 6px;
        pointer-events: auto !important;
        touch-action: manipulation;
      }

      /* ✅ CONTROLS CONTAINER */
      #controls {
        font-size: 16px;
        padding: 8px;
      }

      /* ✅ BUTTONS */
      #controls button {
        font-size: 35px;
        padding: 14px 22px;
        border-radius: 8px;
        background: #d7d7d7;
        color: black;
      }



      #bookingForm,
      #bookingInfo {
        max-height: 120vh !important;
        width: 150vw !important;
        max-width: 150vw !important;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }



      #bookingTitle,
      #groupInfoTitle,
      #logOverviewTitle,
      #formTitle {
        font-size: 60px;
      }


      #bookingForm input,
      #bookingForm select,
      #bookingForm textarea,
      #infoContent,
      #groupForm,
      #singleForm {
        font-size: 35px;
      }



      #groupInfoBox,
      #logOverview {
        max-width: 150vw !important;
        width: 150vw !important;
        max-height: 750px !important;
        font-size: 35px;
      }


      #controls label {
        font-size: 35px;
        padding: 14px 22px;
        border-radius: 8px;
        background: #d7d7d7;
      }

      /* ✅ BUTTON ACTIVE */
      #controls button:active,
      #controls label:active {
        background: #828282;
      }

      #controls button {
        display: none !important;
      }

      body.logged-in #logoutBtn {
        display: inline-block !important;
      }

      body.admin #newBookingBtn {
        display: inline-block !important;
      }

      .no-breakfast-icon span {
        position: relative;
        top: 0;
        left: 0;
        font-size: 32px;
        line-height: 16px;
      }

      .no-breakfast-icon::after {
        top: 15px;
        right: 2px;
        width: 35px;
        height: 1px;
        background: rgb(255, 0, 0);
        transform: rotate(-45deg);
        transform-origin: center;
      }

      body.admin #backupBtn,
      body.admin #logOverviewBtn {
        display: inline-block !important;
      }

      /* ✅ LEGENDE */
      #legend {
        font-size: 32px;
      }

      #legend div {
        font-size: 32px;
        padding: 12px 20px;
        margin: 3px;
      }

      /* ✅ SWIPE TEXT */
      #swipeHint {
        font-size: 32px;
        padding: 20px 30px;
      }

      /* ✅ BOOKING LAYER BREITE */
      .booking-layer {
        width: calc(100vw - 65px);
      }
    }
  </style>
</head>

<body>
  <div id="loginBlocker"></div>

  <div id="swipeBackground"></div>

  <table id="calendar"></table>

  <div id="loginBox" style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 20px;
        border: 1px solid #ccc;
        z-index: 50000;
      ">
    <form id="loginForm" autocomplete="on" onsubmit="event.preventDefault(); login(); return false;">
      <h3>Login</h3>

      <input type="text" id="login_email" name="username" placeholder="Benutzername" autocomplete="username"
        autocapitalize="none" inputmode="text" /><br /><br />
      <input type="password" id="login_password" name="password" placeholder="Passwort"
        autocomplete="current-password" /><br /><br />

      <button type="submit" id="loginSubmitBtn">Login</button>
    </form>
  </div>
  <div id="groupInfoBox" style="
        position: fixed;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 20px;
        border: 1px solid #ccc;
        z-index: 60000;
        max-width: 30vw;
        width: 30vw;
        max-height: 650px;
        overflow-y: auto;
        display: none;
        border-radius: 10px;
      ">
    <h3 id="groupInfoTitle">Gruppe</h3>

    <div id="groupInfoFiles"></div>

    <br />

    <div id="uploadArea"
      style="border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer">
      Dateien hier reinziehen oder klicken
      <input type="file" id="fileInput" multiple style="display: none" />
    </div>

    <br />
    <button onclick="closeGroupInfo()">Schließen</button>
  </div>
  <div id="stickyHeader">
    <div id="controls">
      <button onclick="changeWeek(-1)" id="weekDown" class="auth-only">◀ Woche</button>
      <button onclick="changeWeek(1)" id="weekUp" class="auth-only">Woche ▶</button>

      <div id="datePickerWrapper" class="allowed">
        <input type="date" id="datePicker" class="allowed" />
        <label for="datePicker" class="allowed">📅</label>
      </div>

      <button onclick="undo()" id="undo" style="display: none" title="Rückgängig (Strg+Z)">↶</button>
      <button id="backupBtn" onclick="alert('Backup kommt später')" class="auth-only admin-only">Backup</button>
      <button id="newBookingBtn" onclick="event.stopPropagation(); openNewBooking()"
        style="display: none; position: absolute; left: 50%; transform: translateX(-50%)">
        Neue Buchung anlegen
      </button>
      <div id="topRightButtons">
        <button id="logOverviewBtn" onclick="event.stopPropagation(); openLogOverview();" class="auth-only admin-only">
          🗑️
        </button>

        <button id="logoutBtn" class="auth-only">🚪Logout</button>
      </div>
      <div id="lowerTopRightButtons">
        <button id="monthlyStatsBtn" style="display: none">monatliche Zählung</button>
        <button id="printListsBtn" style="display: none">Listen drucken</button>
      </div>
      <div id="backupList" class="overlay-box" style="
            position: fixed !important;

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            background: #fff;
            border: 1px solid #ccc;
            padding: 20px;

            max-height: 400px;
            min-width: 300px;
            max-width: 400px;
            overflow-y: auto;
            overflow-x: auto;

            display: none;
            z-index: 10001;

            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
          "></div>

      <div id="logOverview" style="
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px;
            border: 1px solid #ccc;
            max-height: 500px;
            width: 500px;
            overflow: auto;
            display: none;
            z-index: 20000;
            border-radius: 10px;
          ">
        <h3 id="logOverviewTitle">Gelöschte Buchungen</h3><br /><br />

        <div style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px">
          <input id="logNameFilter" placeholder="Name" />

          <button onclick="applyLogFilter()">Filtern</button>
          <button onclick="resetLogFilter()">Reset</button>
        </div>

        <div id="logOverviewContent"></div>

        <br />
        <button onclick="closeLogOverview()">Schließen</button>
      </div>

      <div id="overlay" style="
            position: fixed !important;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 10000;
          "></div>
    </div>
    <div id="legend"></div>
  </div>
  <div id="palette"></div>
  <div id="bookingForm" style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 20px;
        border: 1px solid #ccc;
        z-index: 999999;
        display: none;
        width: 350px;
      ">
    <h3 id="formTitle">Neue Buchung</h3>

    <div class="switch-wrapper">
      <span>Einzel</span>

      <label class="switch">
        <input type="checkbox" id="toggleGroup" />
        <span class="slider"></span>
      </label>

      <span>Gruppe</span>
    </div>

    function formatLogText(log) {
      switch (log.field) {
        case "paid":
          return log.new_value === "true" ? "💰 bezahlt" : "💰 nicht bezahlt";

        case "checkin":
          return log.new_value === "true" ? "🏨 Check-in" : "🏨 Check-in entfernt";

        case "room":
          return `🔁 Zimmer gewechselt (${log.old_value} ➡️ ${log.new_value})`;

        case "start":
          return `📅 Anreise geändert`;

        case "end":
          return `📅 Abreise geändert`;

        case "name":
          return `✏️ Name geändert`;

        case "price":
          return `💲 Preis geändert`;

        case "comment":
          return `💬 Kommentar geändert`;

        case "range": {
          let oldVal = {};
          let newVal = {};

          try {
            oldVal = JSON.parse(log.old_value || "{}");
            newVal = JSON.parse(log.new_value || "{}");
          } catch (e) { }

          return `📅 Verschoben (${formatDate(oldVal.start)}–${formatDate(oldVal.end)} ➡️ ${formatDate(newVal.start)}–${formatDate(newVal.end)})`;
        }

        case "group":
          return `👥 Gruppe geändert`;

        case "booking":
          if (log.new_value === "created") return "➕ Buchung erstellt";
          if (log.new_value === "deleted") return "🗑️ Buchung gelöscht";
          break;

        case "multi_update": {
          let oldVals = JSON.parse(log.old_value || "{}");
          let newVals = JSON.parse(log.new_value || "{}");

          let parts = [];

          Object.keys(newVals).forEach((key) => {
            switch (key) {
              case "name":
                parts.push("✏️ Name");
                break;
              case "price":
                parts.push("💲 Preis");
                break;
              case "start":
              case "end":
                parts.push("📅 Datum");
                break;
              case "comment":
                parts.push("💬 Kommentar");
                break;
              case "guests":
                parts.push("👥 Kategorie");
                break;
              case "breakfast":
                parts.push("☕ Frühstück");
                break;
            }
          });

          return `Buchung geändert (${parts.join(", ")})`;
        }
        default:
          return `${log.field}`;
      }
    }

      let start = new Date(startVal);
      let end = new Date(endVal);

      current = new Date(start);
      localStorage.setItem("calendar_current_week", current.toISOString());
      render();

      if (end <= start) {
        return alert("Abreise muss nach Anreise liegen");

      let data = collectGroupData();
      let floorPriority = document.getElementById("g_floorPriority").checked;

      if (data.length === 0) {
        return alert("Bitte mindestens eine Zimmerkategorie auswählen");

      let check = calculateAvailability(start, end, data);

        let msg = "Nicht genügend Zimmer verfügbar:\n\n";

        check.errors.forEach((e) => {
          msg += `${e.type}: es fehlen noch ${e.needed} Zimmer\n`;

        return;

      document.getElementById("bookingForm").style.display = "none";

      openColorPicker(data, start, end, floorPriority);

    function calculateAvailability(start, end, data) {
      let tempUsed = new Set();
      let errors = [];

      let ordered = [...data].sort((a, b) => {
        const order = ["4er", "3er", "DZ B", "DZ", "EZ B", "EZ"];
        return order.indexOf(a.type) - order.indexOf(b.type);
      });

      for (let item of ordered) {
        let count = item.count;

        for (let i = 0; i < count; i++) {
          let found = false;

          for (let row = 0; row < rooms.length; row++) {
            if (tempUsed.has(row)) continue;

            let roomName = rooms[row];
            if (!roomName || roomName.trim() === "") continue;

            if (!canUseRoomSimple(roomName, item.type)) continue;

            if (overlapDates(row, start, end, -1)) continue;

            tempUsed.add(row);
            found = true;
            break;
          }

          if (!found) {
            errors.push({
              type: item.type,
              needed: 1
            });
          }
        }
      }

      if (errors.length > 0) {
        return { ok: false, errors };
      }

      return { ok: true };
    }

    function canUseRoomForCheck(roomName, type) {
      let t = roomName.split(" - ")[1] || "";

      if (type === "EZ") {
        return true;
      }

      if (type === "DZ") {
        return t.includes("DZ");
      }

      if (type === "DZ B") {
        return t.includes("DZ B");
      }

      if (type === "EZ B") {
        return t.includes("B");
      }

      if (type === "3er") {
        return t.includes("3") || t.includes("4");
      }

      if (type === "4er") {
        return t.includes("4");
      }

      return false;
    }

    async function autoPlaceGroup() {
      const placement = groupPlacement;
      if (!placement || !placement.data) return;

      let { start, end } = placement;

      let counter = 0;

      let ordered = [...placement.data].sort((a, b) => {
        const order = ["4er", "3er", "DZ B", "DZ", "EZ B", "EZ"];
        return order.indexOf(a.type) - order.indexOf(b.type);
      });

      for (let item of ordered) {
        if (item.count <= 0) continue;

        let rawGroups = placement.floorPriority ? getFloorPriorityGroups() : getBuildingPriorityGroups(item.type);

        let groups = rawGroups.map((g) =>
          g.map((num) => rooms.findIndex((r) => r.startsWith(num + " "))).filter((i) => i !== -1)
        );

        for (let group of groups) {
          for (let row of group) {
            if (item.count <= 0) break;

            let roomName = rooms[row];
            if (!roomName || roomName.trim() === "") continue;

            if (overlapDates(row, start, end, -1)) continue;

            if (!canUseRoomSimple(roomName, item.type)) continue;

            let booking = await assignRoom(row, item.type, false, true);

            if (booking) {
              bookings.push(booking);
              counter++;

              if (counter % 3 === 0) {
                await new Promise((r) => setTimeout(r, 0));
              }
            }

            if (placement.data.every((d) => d.count === 0)) break;
          }

          if (placement.data.every((d) => d.count === 0)) break;
        }
      }

      draw();
      updatePlacementBox();

      let done = placement.data.every((d) => d.count === 0);

      if (done) {
        await syncGroupToDB();
        finishPlacement();
      }
    }

    function buildCheckInHTML(dateStr) {
      const date = new Date(dateStr);
      date.setHours(0, 0, 0, 0);

      const uniqueBookings = Object.values(Object.fromEntries(bookings.map((b) => [b.id, b])));

      const arrivals = uniqueBookings.filter((b) => {
        if (!isValidRoom(b.row)) return false;
        if (!b.start) return false;
        if (b.checkin) return false;
        if (b.guests === "BLOCK") return false;

        const start = new Date(b.start);
        start.setHours(0, 0, 0, 0);

        return start.getTime() === date.getTime();
      });

      return buildListHTML("Check-In Liste", date, arrivals);
    }

    function buildCheckOutHTML(dateStr) {
      const base = new Date(dateStr);
      base.setHours(0, 0, 0, 0);

      const date = new Date(base);
      date.setDate(base.getDate());

      const uniqueBookings = Object.values(Object.fromEntries(bookings.map((b) => [b.id, b])));

      const departures = uniqueBookings.filter((b) => {
        if (!isValidRoom(b.row)) return false;
        if (!b.end) return false;
        if (b.guests === "BLOCK") return false;

        const end = new Date(b.end);
        end.setHours(0, 0, 0, 0);

        return end.getTime() === date.getTime();
      });

      return buildListHTML("Check-Out Liste", date, departures);
    }

    function buildFreeRoomsHTML(dateStr) {
      const base = new Date(dateStr);
      base.setHours(0, 0, 0, 0);

      let html = `<h1>Freie Zimmer ${base.toLocaleDateString("de-DE")}</h1>`;

      const nightsLimit = 7;

      rooms.forEach((roomName, rowIndex) => {
        if (!roomName || roomName.trim() === "") return;
        let consecutiveFreeNights = 0;

        for (let i = 0; i < nightsLimit; i++) {
          let nightStart = new Date(base);
          nightStart.setDate(base.getDate() + i);

          let nightEnd = new Date(base);
          nightEnd.setDate(base.getDate() + i + 1);

          let occupied = bookings.some((b) => {
            if (b.row !== rowIndex) return false;
            if (b.guests === "BLOCK") return true;

            let start = new Date(b.start);
            let end = new Date(b.end);

            return start < nightEnd && end > nightStart;
          });

          if (occupied) break;

          consecutiveFreeNights++;
        }

        if (consecutiveFreeNights === 0) return;

        let roomLabel = roomName;

        let text = "";

        if (consecutiveFreeNights >= 7) {
          text = "7+ Nächte";
        } else {
          let endDate = new Date(base);
          endDate.setDate(base.getDate() + consecutiveFreeNights);

          text = `${consecutiveFreeNights} ${consecutiveFreeNights === 1 ? "Nacht" : "Nächte"
            } (bis zum ${endDate.toLocaleDateString("de-DE")})`;
        }

        html += `
      <div class="row">
        ${roomLabel}, ${text}
      </div>
    `;
      });

      return html;
    }

    function buildHousekeepingHTML(dateStr, staffCount, extras = []) {
      function getRoomNumberText(roomName) {
        return (roomName || "").split(" - ")[0];
      }

      function getRoomBaseType(roomName) {
        let t = roomName || "";
        if (t.includes("EZ")) return "EZ";
        if (t.includes("DZ")) return "DZ";
        return "";
      }

      function getBookingType(b) {
        if (!b || !b.guests) return "";

        let t = b.guests;

        if (t.includes("EZ")) return "EZ";
        if (t.includes("DZ")) return "DZ";
        if (t.includes("3")) return "DZ";
        if (t.includes("4")) return "DZ";

        return "";
      }

      const base = new Date(dateStr);
      base.setHours(0, 0, 0, 0);

      const targetDate = new Date(base);
      targetDate.setDate(base.getDate());

      const relevant = bookings.filter((b) => {
        if (!isValidRoom(b.row)) return false;
        if (b.guests === "BLOCK") return false;

        let start = new Date(b.start);
        let end = new Date(b.end);

        start.setHours(0, 0, 0, 0);
        end.setHours(0, 0, 0, 0);

        return start <= targetDate && end >= targetDate;
      });

      // ✅ Kategorien
      let neu = [];
      let zuleger = [];
      let kontrolle = [];

      relevant.forEach((b) => {
        let start = new Date(b.start);
        let end = new Date(b.end);

        start.setHours(0, 0, 0, 0);
        end.setHours(0, 0, 0, 0);

        if (start.getTime() === targetDate.getTime()) {
          kontrolle.push(b);
          return;
        }

        if (end.getTime() === targetDate.getTime()) {
          neu.push(b);
          return;
        }

        if (start < targetDate && end > targetDate) {
          zuleger.push(b);
        }
      });

      // ✅ exakt wie im Belegungsplan
      neu.sort((a, b) => a.row - b.row);
      zuleger.sort((a, b) => a.row - b.row);
      kontrolle.sort((a, b) => a.row - b.row);

      // ✅ Personen erstellen
      let people = [];

      for (let i = 0; i < staffCount; i++) {
        people.push({
          neu: [],
          zuleger: [],
          kontrolle: [],
          extras: []
        });
      }

      function assignSequential(list, key) {
        if (!list.length) return;

        let perPerson = Math.ceil(list.length / people.length);
        let index = 0;

        people.forEach((p) => {
          for (let i = 0; i < perPerson; i++) {
            let item = list[index];
            if (!item) break;

            if (key === "neu") {
              p.neu.push({ room: rooms[item.row], booking: item });
            } else if (key === "zul") {
              p.zuleger.push({ room: rooms[item.row], booking: item });
            } else {
              p.kontrolle.push(item);
            }

            index++;
          }
        });
      }

      assignSequential(neu, "neu");
      assignSequential(zuleger, "zul");
      assignSequential(kontrolle, "kon");

      if (extras.length) {
        let index = 0;

        extras.forEach((e) => {
          people[index].extras.push(e);

          index++;
          if (index >= people.length) index = 0;
        });
      }

      // ✅ HTML bauen
      let html = "";

      people.forEach((p, i) => {
        html += `
<div style="page-break-inside: avoid; border-bottom:2px dashed #000; padding-bottom:10px; margin-bottom:15px;">

<h2>Name:_______________________ – ${targetDate.toLocaleDateString("de-DE")}</h2>

<table style="width:100%; table-layout:fixed;">
<tr>
  <th align="left" style="width:33%"><h2>Neu</h2></th>
  <th align="left" style="width:33%"><h2>Zuleger</h2></th>
  <th align="left" style="width:33%"><h2>Kontrolle</h2></th>
</tr>
<tr>

<td valign="top">
`;

        p.neu.forEach((task) => {
          let roomNumber = getRoomNumberText(task.room);
          let type = getBookingType(task.booking) || getRoomBaseType(task.room);

          html += `<div class="row">${roomNumber} – ${type}<br></div>`;
        });
        html += `<br><br><br><br><br>`;
        html += `</td><td valign="top">`;

        p.zuleger.forEach((task) => {
          let roomNumber = getRoomNumberText(task.room);
          let type = getBookingType(task.booking);

          html += `<div class="row">${roomNumber} – ${type}<br></div>`;
        });
        html += `<br><br><br><br><br>`;
        html += `</td><td valign="top">`;

        p.kontrolle.forEach((task) => {
          let roomNumber = getRoomNumberText(rooms[task.row]);
          let type = getBookingType(task);

          html += `<div class="row">${roomNumber} – ${type}<br></div>`;
        });
        html += `<br><br><br><br><br>`;
        html += `</td></tr></table>`;

        if (p.extras.length) {
          html += `<div style="margin-top:10px;">`;

          p.extras.forEach((e) => {
            html += `<div class="row">${e}   </div>`;
          });
          html += `<br><br>`;
          html += `</div>`;
        }

        html += `</div>`;
      });

      return `${html}`;
    }

    function buildBreakfastHTML(dateStr) {

        start.setHours(0, 0, 0, 0);
        end.setHours(0, 0, 0, 0);

        return start < breakfastDate && end >= breakfastDate;

      function getGuestCount(type) {
        if (type === "EZ" || type === "EZ B") return 1;
        if (type === "DZ" || type === "DZ B") return 2;
        if (type === "3er") return 3;

    function runMonthlyStats() {
      if (!confirm("Zahlen des letzten Monats drucken")) return;

      const now = new Date();

      const year = now.getFullYear();
      const month = now.getMonth();

      const lastMonthStart = new Date(year, month - 1, 1);
      const lastMonthEnd = new Date(year, month, 0);

      const uniqueBookings = Object.values(
        Object.fromEntries(bookings.filter((b) => b.id && !String(b.id).startsWith("tmp_")).map((b) => [b.id, b]))
      );

      let bookingsCount = 0;
      let nightsTotal = 0;

      uniqueBookings.forEach((b) => {
        let start = new Date(b.start);
        let end = new Date(b.end);

        if (b.guests === "BLOCK") return;

        let factor = 1;

        if (b.guests.includes("DZ")) factor = 2;
        else if (b.guests.includes("3")) factor = 3;
        else if (b.guests.includes("4")) factor = 4;

        if (start <= lastMonthEnd && end >= lastMonthStart) {
          bookingsCount += factor;

          let realStart = start < lastMonthStart ? lastMonthStart : start;
          let realEnd = end > lastMonthEnd ? lastMonthEnd : end;

          realStart.setHours(0, 0, 0, 0);
          realEnd.setHours(0, 0, 0, 0);

          let diff = (realEnd - realStart) / (1000 * 60 * 60 * 24);

          if (diff > 0) {
            nightsTotal += diff * factor;
          }
        }
      });

      const monthName = lastMonthStart.toLocaleString("de-DE", { month: "long" });

      showMonthlyStatsPopup(monthName, bookingsCount, nightsTotal);
    }

    async function undo() {
      if (history.length === 0) return;

      let last = history.pop();
      if (!last) return;

      const snapshot = last.bookings;

      const { data: userData } = await supa.auth.getUser();
      const currentUser = userData.user;

      if (!currentUser) {
        alert("Nicht eingeloggt!");
        return;
      }

      const userId = currentUser.id;

      let currentMap = new Map(bookings.map((b) => [String(b.id), b]));
      let snapshotMap = new Map(snapshot.map((b) => [String(b.id), b]));

      let toInsert = [];
      let toUpdate = [];
      let toDelete = [];

      let skippedForeign = [];

      for (let [id, snap] of snapshotMap) {
        if (!currentMap.has(id)) {
          if (snap.user_id && snap.user_id !== userId) {
            skippedForeign.push(snap);
            continue;
          }

          let copy = { ...snap };
          delete copy.id;
          toInsert.push(copy);
          continue;
        }

        let cur = currentMap.get(id);

        if (cur.user_id && cur.user_id !== userId) {
          skippedForeign.push(cur);
          continue;
        }

        if (JSON.stringify(cur) !== JSON.stringify(snap)) {
          let copy = { ...snap };
          delete copy.id;

          toUpdate.push({ id, data: copy });
        }
      }

      let groupDeletes = new Set();

      for (let [id, cur] of currentMap) {
        if (!snapshotMap.has(id)) {
          if (cur.user_id && cur.user_id !== userId) {
            skippedForeign.push(cur);
            continue;
          }

          if (cur.group_id) {
            groupDeletes.add(cur.group_id);
          } else {
            toDelete.push(id);
          }
        }
      }

      for (let groupId of groupDeletes) {
        for (let [id, cur] of currentMap) {
          if (cur.group_id === groupId) {
            if (cur.user_id && cur.user_id !== userId) {
              skippedForeign.push(cur);
              continue;
            }

            toDelete.push(id);
          }
        }
      }

      isUndoing = true;

      if (toDelete.length) {
        await supa.from("bookings").delete().in("id", toDelete);

        if (groupDeletes.size > 0) {
          bookings = bookings.filter((b) => !groupDeletes.has(b.group_id));
        } else {
          bookings = bookings.filter((b) => !toDelete.includes(String(b.id)));
        }
      }

      for (let u of toUpdate) {
        await supa.from("bookings").update(u.data).eq("id", u.id);
      }

      if (toInsert.length) {
        await supa.from("bookings").insert(toInsert);
      }

      isUndoing = false;

      await loadData();
    }

      render();
    }

    function canPlaceInRoom(row, type, start, end, ignoreIndex = -1) {
      let roomName = rooms[row];

      if (!roomName || roomName.trim() === "") return false;

      if (!canUseRoomSimple(roomName, type)) return false;

      if (overlapDates(row, start, end, ignoreIndex)) return false;

      return true;
    }

    function overlapDates(row, start, end, ignoreId = null) {
      const s = normalizeDate(start);
      const e = normalizeDate(end);

      return bookings.some((b) => {
        if (ignoreId !== null && String(b.id) === String(ignoreId)) {
          return false;
        }

        if (b.row !== row) return false;

        const bs = normalizeDate(b.start);
        const be = normalizeDate(b.end);

        return s < be && e > bs;
      });
    }

    function isPreferredEZRoom(roomName) {
      return roomName.includes("EZ") || roomName.includes("kl. DZ");
    }

    function getRoomType(roomName) {
      if (!roomName) return "";
      return roomName.split(" - ")[1];
    }

    function assignRoom(row, forcedType = null, dry = false, batch = false, options = {}) {
      if (!groupPlacement) return false;
      const user = currentUser;
      if (!user) return false;

      let tempOccupied = options?.tempOccupied || new Set();

      if (overlapDates(row, groupPlacement.start, groupPlacement.end, -1) || tempOccupied.has(row)) {
        return false;
      }

      let roomName = rooms[row];
      if (!roomName || roomName.trim() === "") return false;
      let item;

      if (forcedType) {
        item = groupPlacement.data.find((d) => d.type === forcedType && d.count > 0);

        if (!item) return false;

        let canUse;

        if (forcedType === "EZ") {
          canUse = getGuestOptions(roomName).includes("EZ");
        } else {
          canUse = canUseRoomSimple(roomName, forcedType);
        }

        if (!canUse) return false;
      } else {
        item = groupPlacement.data
          .filter((d) => d.count > 0)

          .filter((d) => {
            if (d.type === "EZ") {
              return getGuestOptions(roomName).includes("EZ");
            }

            return canUseRoomSimple(roomName, d.type);
          })

          .sort((a, b) => {
            let order = ["4er", "3er", "DZ B", "DZ", "EZ B", "EZ"];
            return order.indexOf(a.type) - order.indexOf(b.type);
          })[0];
      }

      if (!item) return false;

      let group = groupsMap[groupPlacement.groupId];

      let newBooking = {
        row,
        start: groupPlacement.start.toISOString(),
        end: groupPlacement.end.toISOString(),
        name: "",
        price: item.price,
        comment: "",
        guests: item.type,
        group_id: group.id,
        color: group.color,
        user_id: user.id,
        paid: false,
        checkin: false,

        bluecard: groupPlacement.bluecard || false,
        bluecard_count: groupPlacement.bluecard ? 1 : 0
      };

      let temp = {
        ...newBooking,
        id: "tmp_" + Date.now() + "_" + Math.random()
      };

      if (dry) {
        return temp;
      }

      item.count--;

      if (!batch) {
        bookings.push(temp);
      }

      return temp;
    }

    function isAnyDZ(room) {
      return isNormalDZ(room) || isDeluxeDZ(room) || isMultiDZ(room) || isSmallDZ(room);
    }

    async function add(row, day, e) {
      if (f) return;

      let weekStart = normalizeDate(startOfWeek(current));
      let date = new Date(weekStart);
      date.setDate(weekStart.getDate() + day);

      if (groupPlacement || singlePlacement) {
        let possible = false;

        if (groupPlacement) {
          possible = groupPlacement.data.some(
            (x) => x.count > 0 && canPlaceInRoom(row, x.type, groupPlacement.start, groupPlacement.end)
          );
        }

        if (singlePlacement) {
          possible = canPlaceInRoom(row, singlePlacement.guests, singlePlacement.start, singlePlacement.end);
        }

        }

        let booking = {

        };

        saveHistory();

        let oldStart = b.start;
        let oldEnd = b.end;
        let oldName = b.name;
        let oldPrice = b.price;
        let oldComment = b.comment;
        let oldGuests = b.guests;
        let oldBreakfast = b.breakfast;

        let oldPetCount = b.pet_count;

        b.bluecard_count = bluecard_count;
        b.crib = crib;
        b.crib_count = crib_count;

        render();

        supa
          .from("bookings")
          .update({
            start: b.start,
            end: b.end,
            name,
            company,
            price,
            comment,
            guests,
            breakfast,
            group_id: b.group_id,

            pet: b.pet,
            pet_count: b.pet_count,

            bluecard: b.bluecard,
            bluecard_count: b.bluecard_count,
            crib: b.crib,
            crib_count: b.crib_count,

            user_id: user?.id
          })
          .eq("id", b.id)
          .then(async ({ error }) => {
            if (error) {
              console.error(error);
              alert("Fehler beim Speichern");
              return;
            }

            let changes = {};

            if (oldStart !== b.start) {
              changes.start = {
                old: oldStart,
                new: b.start
              };
            }

            if (oldEnd !== b.end) {
              changes.end = {
                old: oldEnd,
                new: b.end
              };
            }

            if (oldName !== b.name) {
              changes.name = {
                old: oldName,
                new: b.name
              };
            }

            if (oldPrice !== b.price) {
              changes.price = {
                old: oldPrice,
                new: b.price
              };
            }

            if (oldComment !== b.comment) {
              changes.comment = {
                old: oldComment,
                new: b.comment
              };
            }

            if (oldGuests !== b.guests) {
              changes.guests = {
                old: oldGuests,
                new: b.guests
              };
            }

            if (oldBreakfast !== b.breakfast) {
              changes.breakfast = {
                old: oldBreakfast,
                new: b.breakfast
              };
            }

            if (oldPet !== b.pet) {
              changes.pet = { old: oldPet, new: b.pet };
            }

            if (oldPetCount !== b.pet_count) {
              changes.pet_count = { old: oldPetCount, new: b.pet_count };
            }

            if (oldBlue !== b.bluecard) {
              changes.bluecard = { old: oldBlue, new: b.bluecard };
            }

            if (oldBlueCount !== b.bluecard_count) {
              changes.bluecard_count = { old: oldBlueCount, new: b.bluecard_count };
            }

            if (oldCrib !== b.crib) {
              changes.crib = { old: oldCrib, new: b.crib };
            }

            if (oldCribCount !== b.crib_count) {
              changes.crib_count = { old: oldCribCount, new: b.crib_count };
            }

            if (Object.keys(changes).length > 0) {
              logBookingAction({
                bookingId: b.id,
                action: "update",
                field: "multi_update",
                oldValue: Object.fromEntries(Object.entries(changes).map(([k, v]) => [k, v.old])),
                newValue: Object.fromEntries(Object.entries(changes).map(([k, v]) => [k, v.new])),
                room: rooms[b.row],
                bookingAt: b.end
              });
            }
          });

        let color = b.color;

        if (guests.includes("B")) {
          color = "pink";
        } else if (b.color === "pink") {
          color = "yellow";
        }
      }
      closeForm();
    }

    function isNormalDZ(room) {
      let type = getRoomType(room);

        !type.includes("3") &&
        !type.includes("4") &&

      );

      return type.includes("3") || type.includes("4");

    <b>👥 Zimmerkategorie:</b>${b.guests || "-"}<br><br>
    <b>✏️ Name:</b>${b.name || "-"}<br><br>
    <b>🏢 Firma:</b>${b.company || "-"}<br><br>
    <b>📅 Anreise:</b>${start}<br>
    <b>📅 Abreise:</b>${end}<br><br>
    <b>💲 Preis:</b>${b.price || "-"}<br><br>
    <b>💬 Kommentar:</b>${b.comment || "-"}<br><br>
    <b>Extrainfo:</b>${extra || "-"}<br><br>


<b>🎨 Gruppe:</b>
${renderGroupBadge(groupsMap[b.group_id])}
<br><br>
    <b>💰 Bezahlt:</b>${b.paid ? "🟢" : "🔴"}<br>
    <b>🏨 Check-in:</b>${b.checkin ? "🟢" : "🔴"}
  `;

      html += `
    <br><br>
    <small style="color:#555">
      Zuletzt bearbeitet von: <b>${lastUser}</b> (${lastEditTime})
    </small>
  `;

      if (isAdmin()) {
        html += `
    <br><br>
    <button onclick="toggleBookingLogs(${b.id})">Verlauf</button>
    <button onclick="printBooking(${index})">🖨️ Drucken</button>
  `;
      }

      document.getElementById("infoContent").innerHTML = html;
      document.getElementById("bookingInfo").style.display = "block";
    }

    function closeInfo() {
      document.getElementById("bookingInfo").style.display = "none";
    }

    function draw() {
      document.querySelectorAll(".booking").forEach((e) => e.remove());

      let weekStart = normalizeDate(startOfWeek(current));

      bookings.forEach((b, i) => {
        let bStart = normalizeDate(b.start);
        let bEnd = normalizeDate(b.end);

        let diffStart = Math.floor((bStart - weekStart) / (1000 * 60 * 60 * 24));
        let diffEnd = Math.floor((bEnd - weekStart) / (1000 * 60 * 60 * 24));

        if (diffEnd <= 0) {
          let endsExactlyAtStart = diffEnd === 0;

          if (!endsExactlyAtStart) return;
        }
        if (diffStart >= 7) return;

        let visStart = Math.max(0, diffStart);
        let visEnd = Math.min(7, diffEnd);

        let startsBeforeWeek = diffStart < 0;
        let endsAfterWeek = diffEnd >= 7;

        let row = document.querySelectorAll("tr")[b.row + 1];
        if (!row) return;

        let cell = row.children[visStart + 1];

        let d = document.createElement("div");
        d.className = "booking";

        if (b.checkin) {
          d.classList.add("checked-in");
        }

        if (b.guests === "BLOCK") {
          d.classList.add("block");
        }

        d.dataset.id = b.id;
        d.dataset.index = i;

        d.onclick = (e) => {
          // ✅ Mehrfachauswahl
          if (f) {
            e.stopPropagation();

            if (selected.includes(i)) {
              selected = selected.filter((x) => x !== i);
            } else {
              selected.push(i);
            }

            render();
            return;
          }

          // ✅ Mobile ohne Admin → blockieren
          if (isMobile) {
            if (!isAdmin()) {
              return;
            } else {
              const now = Date.now();

              if (now - lastTap < 300) {
                clearTimeout(clickTimer);

                let b = bookings[i];

                if (b.guests !== "BLOCK") {
                  openEditBooking(b);
                }

                lastTap = 0;
                return;
              }

              lastTap = now;

              clickTimer = setTimeout(() => {
                openInfo(i);
              }, 300);

              return;

            }
          }

          // ✅ Desktop → Timer nutzen
          clearTimeout(clickTimer);

          clickTimer = setTimeout(() => {
            openInfo(i);
          }, 200);
        };

        if (selected.includes(i)) {
          d.classList.add("selected");
        }

        let widthDays = visEnd - visStart;

        let rowEl = document.querySelectorAll("tr")[b.row + 1];

        let cells = rowEl.querySelectorAll("td:not(.room)");

        let startCell = cells[visStart];

        let renderEnd = endsAfterWeek ? 7 : visEnd;
        let endCell = cells[renderEnd] || cells[cells.length - 1];

        let startRect = startCell.getBoundingClientRect();
        let endRect = endCell.getBoundingClientRect();

        let layer = rowEl.querySelector(".booking-layer");
        let layerRect = layer.getBoundingClientRect();

        let dayWidth = startRect.width;

        let left = startRect.left - layerRect.left + dayWidth / 2;

        if (diffStart < 0) {
          left -= dayWidth * 0.5;
        }

        let right = endRect.left - layerRect.left + dayWidth / 2;

        if (diffEnd >= 7) {
          right += dayWidth * 0.5;
        }

        const GAP = 4;

        d.style.left = left + GAP / 2 + "px";
        d.style.width = right - left - GAP + "px";

        let group = groupsMap[b.group_id];

        let color = group ? group.color : b.color;

        d.style.backgroundColor = color;

        d.style.color = isLightColor(color) ? "black" : "white";

        let flags = document.createElement("div");
        flags.className = "flags";

        if (b.guests === "BLOCK") {
          flags.style.display = "none";
        }

        let paid = document.createElement("div");
        paid.className = "flag ";
        paid.innerHTML = "●";

        if (!b.paid) paid.classList.add("off");

        paid.onclick = async (e) => {
          if (isMobile) return;
          if (f) return;
          if (!isEditAllowed()) return;

          e.stopPropagation();

          let oldVal = b.paid;
          let newVal = !b.paid;

          b.paid = newVal;
          render();

          const user = currentUser;

          const { error } = await supa
            .from("bookings")
            .update({
              paid: newVal,
              user_id: user?.id
            })
            .eq("id", b.id);

          if (error) {
            b.paid = oldVal;
            render();

            alert("Fehler beim Speichern");
            console.error(error);
            return;
          }

          logBookingAction({
            bookingId: b.id,
            action: "update",
            field: "paid",
            oldValue: oldVal,
            newValue: newVal,
            room: rooms[b.row],
            bookingAt: b.end
          });
        };

        let check = document.createElement("div");
        check.className = "flag ";
        check.innerHTML = "✔";

        if (!b.checkin) check.classList.add("off");

        check.onclick = async (e) => {
          if (isMobile) return;
          if (f) return;
          if (!isEditAllowed()) return;

          e.stopPropagation();

          let oldVal = b.checkin;
          let newVal = !b.checkin;

          b.checkin = newVal;

          render();

          const user = currentUser;

          const { error } = await supa
            .from("bookings")
            .update({
              checkin: newVal,
              user_id: user?.id
            })
            .eq("id", b.id);

          if (error) {
            b.checkin = oldVal;
            render();

            alert("Fehler beim Speichern");
            console.error(error);
            return;
          }

          logBookingAction({
            bookingId: b.id,
            action: "update",
            field: "checkin",
            oldValue: oldVal,
            newValue: newVal,
            room: rooms[b.row],
            bookingAt: b.end
          });
        };

        flags.appendChild(paid);
        flags.appendChild(check);
        let icons = "";
        let commentText = b.comment ? " - " + b.comment : "";
        if (b.breakfast === false) {
          icons += `<span class='no-breakfast-icon'><span>☕</span></span>`;
        }

        if (b.bluecard) {
          icons += `<span class="icons"><span title="Blaue Karte">${"🟦".repeat(b.bluecard_count || 1)}</span></span>`;
        }

        if (b.pet) {
          icons += `<span class="icons"><span title="Hund">${"🐕".repeat(b.pet_count || 1)}</span></span>`;
        }

        if (b.crib) {
          icons += `<span class="icons"><span title="Kinderbett">${"👶".repeat(b.crib_count || 1)}</span></span>`;
        }

        let companyText = b.company ? ` 🏢 ${b.company}` : "";
        let txt = document.createElement("span");

        txt.className = "text";
        txt.style.flex = 1;

        let paidIcon = b.paid ? `<span class="icons"><span class="paid-icon">💰</span></span> ` : "";

        let mobileGuests = "0";

        if (b.guests === "4er") {
          mobileGuests = "4";
        } else if (b.guests === "3er") {
          mobileGuests = "3";
        } else if (b.guests === "DZ" || b.guests === "DZ B") {
          mobileGuests = "2";
        } else {
          mobileGuests = "1";
        }

        if (isMobile) {
          if (b.guests === "BLOCK") {
            txt.innerHTML = "🚫";
          } else {
            if (!isAdmin()) {
              txt.innerHTML = ``;
            } else {
              txt.innerHTML = `${paidIcon}${mobileGuests}:${b.name}${companyText}${icons}`;
            }
          }
        } else {
          if (b.guests === "BLOCK") {
            txt.innerHTML = "🚫 BLOCKIERT";
          } else {
            txt.innerHTML = `${paidIcon}${b.guests} ${b.name || (group ? group.name : "")}${companyText}${icons}${commentText}`;
          }
        }

        let pr = document.createElement("span");
        pr.className = "price";

        if (!b.price || isMobile) {
          pr.innerHTML = "";
        } else if (isNaN(b.price)) {
          pr.innerHTML = b.price;
        } else {
          pr.innerHTML = b.price + "€";
        }

        let r = document.createElement("div");
        r.className = "handle right";
        r.onmousedown = (e) => {
          if (isMobile) return;
          if (f) return;
          e.stopPropagation();
          resize(e, i, 1);
        };

        let l = document.createElement("div");
        l.className = "handle left";

        l.onmousedown = (e) => {
          if (isMobile) return;
          if (f) return;

          e.stopPropagation();
          e.preventDefault();

          e.stopImmediatePropagation();

          drag = null;
          resizing = true;

          resize(e, i, -1);
        };

        let dragHandle = document.createElement("div");

        dragHandle.className = "drag-handle";

        dragHandle.style.width = "10px";
        dragHandle.style.cursor = "grab";
        dragHandle.style.marginRight = "6px";
        dragHandle.style.background = "rgba(0,0,0,0.2)";
        dragHandle.style.borderRadius = "3px";

        dragHandle.innerHTML = "↔";
        dragHandle.style.fontSize = "12px";
        dragHandle.style.display = "flex";
        dragHandle.style.alignItems = "center";
        dragHandle.style.justifyContent = "center";

        dragHandle.style.pointerEvents = "auto";

        if (!startsBeforeWeek) {
          d.appendChild(l);
        }

        if (!endsAfterWeek) {
          d.appendChild(r);
        }

        let moveBtn = document.createElement("div");

        moveBtn.className = "move-handle";
        moveBtn.innerHTML = "↕";

        moveBtn.style.position = "absolute";
        moveBtn.style.left = "75px";
        moveBtn.style.top = "50%";
        moveBtn.style.transform = "translateY(-50%)";

        moveBtn.style.display = "none";
        moveBtn.style.cursor = "ns-resize";

        d.addEventListener("mouseenter", () => {
          if (isMobile) return;
          if (moving) return;
          moveBtn.style.display = "flex";
        });

        d.addEventListener("mouseleave", () => {
          if (isMobile) return;
          if (!moving) moveBtn.style.display = "none";
        });

        d.append(flags, dragHandle, moveBtn, txt, pr);

        dragHandle.onmousedown = (e) => {
          let el = document.querySelector(`.booking[data-index='${i}']`);
          let b = bookings[i];

          let weekStart = normalizeDate(startOfWeek(current));
          let startDate = normalizeDate(b.start);

          let startDay = Math.floor((startDate - weekStart) / (1000 * 60 * 60 * 24));

          let layer = el.parentElement;
          let layerRect = layer.getBoundingClientRect();

          let start = new Date(b.start);
          let end = new Date(b.end);

          let rowEl = document.querySelectorAll("tr")[b.row + 1];

          let cells = rowEl.querySelectorAll("td:not(.room)");

          let firstCellRect = cells[0].getBoundingClientRect();

          let dayWidth = firstCellRect.width;

          let offsetX = e.clientX - firstCellRect.left;

          let durationDays = (end - start) / (1000 * 60 * 60 * 24);

          let elRect = el.getBoundingClientRect();

          let correctedLeft = elRect.left - layerRect.left;

          let diffStart = Math.round((start - weekStart) / (1000 * 60 * 60 * 24));

          if (diffStart < 0) {
            correctedLeft += diffStart * dayWidth;
          }

          el.style.width = durationDays * dayWidth + "px";
          el.style.left = correctedLeft + "px";

          let closestDay = Math.round(offsetX / dayWidth);
          closestDay = Math.max(0, Math.min(6, closestDay));

          drag = {
            id: b.id,
            i: i,
            startDay: startDay,
            mouseStartX: e.clientX,
            offsetX: offsetX
          };

          resizing = false;
          document.body.style.userSelect = "none";
        };

        moveBtn.onmousedown = (e) => {
          document.body.classList.add("moving");
          if (isMobile) return;
          if (f) return;
          if (!isEditAllowed()) return;

          e.stopPropagation();

          let b = bookings[i];

          moving = {
            index: i,
            startRow: b.row
          };

          highlightMoveOptions(b);

          document.body.style.userSelect = "none";
        };

        d.ondblclick = (e) => {
          if (isMobile) return;

          let b = bookings[i];

          if (b.guests === "BLOCK") {
            e.stopPropagation();
            return;
          }

          clearTimeout(clickTimer);

          openEditBooking(b);
        };

        d.oncontextmenu = async (e) => {
          if (isMobile) return;
          e.preventDefault();
          e.stopPropagation();

          drag = null;
          resizing = false;
          document.body.style.userSelect = "auto";

          if (f) return;
          if (!isEditAllowed()) return;

          if (!confirm("Löschen?")) return;

          const id = d.dataset.id;

          if (!id) {
            console.warn("Keine ID gefunden!");
            return;
          }

          isDeleting = true;
          saveHistory();

          const { data, error } = await supa.from("bookings").delete().eq("id", id).select();

          if (error) {
            alert("Fehler beim Löschen");
            console.error(error);
            isDeleting = false;
            return;
          }

          bookings = bookings.filter((x) => String(x.id) !== String(id));

          render();

          logBookingAction({
            bookingId: id,
            action: "delete",
            field: "booking",

            oldValue: {
              name: b.name || "",
              company: b.company || "",
              guests: b.guests || ""
            },

            newValue: "deleted",
            room: rooms[b.row],

            bookingAt: b.end
          });

          isDeleting = false;
        };

        layer.appendChild(d);
      });
    }

    window.onmousemove = (e) => {
      if (moving) {
        let b = bookings[moving.index];

        let rows = document.querySelectorAll("tr");

        let closestRow = b.row;
        let closestDist = Infinity;

        rows.forEach((tr, rIndex) => {
          if (rIndex === 0) return;

          let rect = tr.getBoundingClientRect();
          let center = rect.top + rect.height / 2;

          let dist = Math.abs(e.clientY - center);

          if (dist < closestDist) {
            closestDist = dist;
            closestRow = rIndex - 1;
          }
        });

        if (closestRow !== b.row) {
          if (canPlaceInRoom(closestRow, b.guests, new Date(b.start), new Date(b.end))) {
            b.row = closestRow;

            draw();
          }
        }

        return;
      }

      if (drag && !resizing) {
        let el = document.querySelector(`.booking[data-index='${drag.i}']`);

        if (!el) {
          drag = null;
          return;
        }

        let deltaX = e.clientX - drag.mouseStartX;

        el.style.transform = `translateX(${deltaX}px)`;
        el.style.transition = "none";
        el.style.pointerEvents = "none";
      }
    };

    window.onmouseup = async (event) => {
      if (moving) {
        resetMoveHighlight();
        let b = bookings[moving.index];

        let oldRow = moving.startRow;
        let newRow = b.row;

        let oldRoom = rooms[oldRow];
        let newRoom = rooms[newRow];

        moving = null;
        document.body.classList.remove("moving");
        document.body.style.userSelect = "auto";

        if (oldRow !== newRow) {
          const user = currentUser;

          const { error } = await supa
            .from("bookings")
            .update({
              row: newRow,
              user_id: user?.id
            })
            .eq("id", b.id);

          if (error) {
            console.error(error);

            b.row = oldRow;
            render();

            alert("Fehler beim Verschieben");
            return;
          }

          logBookingAction({
            bookingId: b.id,
            action: "update",
            field: "room",
            oldValue: String(oldRoom),
            newValue: String(newRoom),
            room: newRoom,
            bookingAt: b.end
          });
        } else {
          render();
        }

        return;
      }
      if (!drag && !resizing) {
        drag = null;
        resizing = false;
        document.body.style.userSelect = "auto";
        return;
      }
      document.body.style.cursor = "grabbing";

      let currentDrag = drag;

      if (!currentDrag && !resizing) {
        console.warn("mouseup ohne drag");
        return;
      }

      document.body.style.userSelect = "auto";

      if (resizing) {
        resizing = false;
        drag = null;
        document.body.style.userSelect = "auto";
        return;
      }

      if (!currentDrag) {
        drag = null;
        resizing = false;
        return;
      }

      let b = bookings.find((x) => String(x.id) === String(currentDrag.id));

      let el = document.querySelector(`.booking[data-index='${currentDrag.i}']`);
      if (!el) return;

      let rowEl = document.querySelectorAll("tr")[b.row + 1];
      let cell = rowEl.querySelector("td:not(.room)");
      let cells = rowEl.querySelectorAll("td:not(.room)");
      let dayWidth = cell.getBoundingClientRect().width;

      let mouseX = event.clientX;

      let closestDay = 0;
      let closestDistance = Infinity;

      cells.forEach((cell, dayIndex) => {
        let rect = cell.getBoundingClientRect();
        let center = rect.left + rect.width / 2;

        let dist = Math.abs(mouseX - center);

        if (dist < closestDistance) {
          closestDistance = dist;
          closestDay = dayIndex;
        }
      });

      let moveDays = closestDay - currentDrag.startDay;

      let changed = false;
      let oldStart = b.start;
      let oldEnd = b.end;

      if (moveDays !== 0) {
        let baseStart = new Date(b.start);
        let baseEnd = new Date(b.end);

        let duration = baseEnd - baseStart;

        let newStart = new Date(baseStart);
        newStart.setDate(newStart.getDate() + moveDays);

        let newEnd = new Date(newStart.getTime() + duration);
        newStart.setHours(CHECKIN_HOUR, 0, 0, 0);
        newEnd.setHours(CHECKOUT_HOUR, 0, 0, 0);

        if (!overlapDates(b.row, newStart, newEnd, currentDrag.id)) {
          saveHistory();

          b.start = newStart.toISOString();
          b.end = newEnd.toISOString();

          changed = true;
        }
      }
      document.body.style.cursor = "default";
      render();

      el = document.querySelector(`.booking[data-index='${currentDrag.i}']`);
      if (el) {
        el.style.transform = "none";
        el.style.transition = "";
      }

      justDragged = true;
      setTimeout(() => (justDragged = false), 100);

      drag = null;
      resizing = false;
      document.body.style.userSelect = "auto";

      if (changed) {
        const user = currentUser;

        const { data, error } = await supa
          .from("bookings")
          .update({
            start: b.start,
            end: b.end,
            user_id: user?.id
          })
          .eq("id", b.id)
          .select();

        if (error) {
          console.error("Update Fehler:", error);

          b.start = oldStart;
          b.end = oldEnd;
          render();
          return;
        }

        logBookingAction({
          bookingId: b.id,
          action: "update",
          field: "range",
          oldValue: {
            start: oldStart,
            end: oldEnd
          },
          newValue: {
            start: b.start,
            end: b.end
          },
          room: rooms[b.row],
          bookingAt: b.end
        });

        if (data && data[0]) {
          bookings = bookings.map((x) => (x.id === currentDrag.id ? data[0] : x));
        }
      }
    };

    async function resize(e, i, dir) {
      if (!isEditAllowed()) return;

      if (e.button !== 0) return;
      e.preventDefault();

      drag = null;
      resizing = true;

      let b = bookings[i];
      let weekStart = normalizeDate(startOfWeek(current));
      let baseStart = new Date(b.start);
      let baseEnd = new Date(b.end);
      let lastMouseX = e.clientX;

      if (dir === -1) {
        let base = normalizeDate(baseStart);
        let week = normalizeDate(weekStart);

        if (base < week) {
          return;
        }
      }

      let visibleStart = baseStart < weekStart ? new Date(weekStart) : new Date(baseStart);

      let rowEl = document.querySelectorAll("tr")[b.row + 1];
      let cell = rowEl.querySelector("td:not(.room)");

      let dayWidth = cell.getBoundingClientRect().width;

      let el = document.querySelector(`.booking[data-index='${i}']`);

      let rect = el.getBoundingClientRect();

      let layer = el.parentElement;
      let layerRect = layer.getBoundingClientRect();

      let resizeState = {
        mouseStartX: e.clientX,
        startWidth: rect.width,
        startLeft: rect.left - layerRect.left
      };

      if (!el) return;

      const resizeMove = (ev) => {
        if (!resizing) return;

        lastMouseX = ev.clientX;

        let deltaX = ev.clientX - resizeState.mouseStartX;

        el.style.transform = "none";

        if (dir === 1) {
          el.style.width = resizeState.startWidth + deltaX + "px";
        }

        if (dir === -1) {
          el.style.left = resizeState.startLeft + deltaX + "px";
          el.style.width = resizeState.startWidth - deltaX + "px";
        }
      };

      const resizeEnd = async (ev) => {
        saveHistory();

        resizing = false;
        drag = null;
        document.body.style.userSelect = "auto";

        let weekStart = normalizeDate(startOfWeek(current));

        let rowEl = document.querySelectorAll("tr")[b.row + 1];
        let cells = rowEl.querySelectorAll("td:not(.room)");

        let mouseX = lastMouseX;

        let closestSlot = 0;
        let closestDistance = Infinity;

        cells.forEach((cell, dayIndex) => {
          let rect = cell.getBoundingClientRect();

          for (let half = 0; half < 2; half++) {
            let center;

            if (half === 0) {
              center = rect.left + rect.width * 0.25;
            } else {
              center = rect.left + rect.width * 0.75;
            }

            let slotIndex = dayIndex * 2 + half;
            let distance = Math.abs(mouseX - center);

            if (distance < closestDistance) {
              closestDistance = distance;
              closestSlot = slotIndex;
            }
          }
        });

        let currentStartSlot = getSlotFromDate(b.start, weekStart, false);
        let currentEndSlot = getSlotFromDate(b.end, weekStart, true);

        if (dir === -1 && closestSlot % 2 === 1) {
          closestSlot--;
        }

        if (dir === 1 && closestSlot % 2 === 0) {
          closestSlot++;
        }

        if (dir === -1 && currentEndSlot - closestSlot < 2) {
          closestSlot = currentEndSlot - 2;
        }

        if (dir === 1 && closestSlot - currentStartSlot < 2) {
          closestSlot = currentStartSlot + 2;
        }

        if (dir === -1 && closestSlot % 2 === 1) {
          closestSlot--;
        }

        if (dir === 1 && closestSlot % 2 === 0) {
          closestSlot++;
        }

        closestSlot = Math.max(0, Math.min(13, closestSlot));

        if (dir === -1) {
          let newStart = new Date(weekStart);
          newStart.setDate(weekStart.getDate() + Math.floor(closestSlot / 2));

          newStart.setHours(CHECKIN_HOUR, 0, 0, 0);

          if (!overlapDates(b.row, newStart, baseEnd, b.id)) {
            let oldStart = b.start;

            b.start = newStart.toISOString();

            render();
            isResizingUpdate = true;
            const user = currentUser;

            const { error } = await supa
              .from("bookings")
              .update({
                start: b.start,
                user_id: user?.id
              })
              .eq("id", b.id);
            isResizingUpdate = false;
            if (error) {
              console.error(error);

              b.start = oldStart;
              render();
              isResizingUpdate = false;
              return;
            }

            logBookingAction({
              bookingId: b.id,
              action: "update",
              field: "start",
              oldValue: oldStart,
              newValue: b.start,
              room: rooms[b.row],
              bookingAt: b.end
            });
          }
        }

        if (dir === 1) {
          let newEnd = new Date(weekStart);
          newEnd.setDate(weekStart.getDate() + Math.floor(closestSlot / 2));

          newEnd.setHours(CHECKOUT_HOUR, 0, 0, 0);

          if (!overlapDates(b.row, baseStart, newEnd, b.id)) {
            let oldEnd = b.end;

            b.end = newEnd.toISOString();

            render();
            isResizingUpdate = true;
            const user = currentUser;

            const { error } = await supa
              .from("bookings")
              .update({
                end: b.end,
                user_id: user?.id
              })
              .eq("id", b.id);
            isResizingUpdate = false;
            if (error) {
              console.error(error);
              alert("Speichern fehlgeschlagen");

              b.end = oldEnd;
              render();
              isResizingUpdate = false;
              return;
            }

            logBookingAction({
              bookingId: b.id,
              action: "update",
              field: "end",
              oldValue: oldEnd,
              newValue: b.end,
              room: rooms[b.row],
              bookingAt: b.end
            });
          }
        }

        el.style.transform = "none";
        el.style.left = "";
        el.style.width = "";

        document.removeEventListener("mousemove", resizeMove);

        resizing = false;
        drag = null;
      };

      document.addEventListener(
        "mouseup",
        (ev) => {
          resizeEnd(ev);
          document.removeEventListener("mousemove", resizeMove);
        },
        { once: true }
      );

      document.addEventListener("mousemove", resizeMove);
    }

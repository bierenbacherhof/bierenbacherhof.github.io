<!doctype html>
<html lang="de">
  <head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <meta charset="UTF-8" />
   
<meta 
  name="viewport" 
  content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
/>

    <title>Hotel Belegungsplan</title>

    <style>
      
html {
  -webkit-text-size-adjust: 100%;
}
      
     

            body {
              font-family: Arial;
              visibility: hidden;
              cursor: default;
              margin: 0;
              position: relative;
              z-index: 0;
            }

            #controls {

      padding: 10px;
        position: relative;
        background: #fff;

            }

            table {
              border-collapse: collapse;
              border-spacing: 0;
              width: 100%;
              position: relative;
            }
            th,
            td {
              border: 1px solid #ccc;
              position: relative;
              height: 25px;
              overflow: visible;
            }

      
thead {
  position: relative;
  z-index: 2001 !important;
   border-collapse: collapse;
}

            thead th {
      position: sticky;
        z-index: 2000 !important;
        background: #eee;
   }

      
thead th:not(:last-child)::before {
  content: "";
  position: absolute;

  top: 0;
  right: -1px;
  width: 2px;
  height: 100%;

  background: #666;

  z-index: 2001; /* ✅ ÜBER ALLEM */
  pointer-events: none;
}

            th {
              background: transparent;
              pointer-events: auto;
            }


            html,
            body {
              margin: 0;
              padding: 0;
              
            }

            td {
              pointer-events: auto;
            }
            .room {
              width: 180px;
              background: #fafafa;
              pointer-events: auto;
              z-index: 1;
              position: relative;
            }

            body.select-mode {
              cursor: crosshair !important;
            }

            body.select-mode .booking,
            body.select-mode .booking * {
              cursor: crosshair !important;
            }

            .half::after {
              content: "";
              position: absolute;
              left: 50%;
              top: 0;
              bottom: 0;
              border-left: 1px dashed #bbb;
            }
            .half {
              pointer-events: auto;
            }
            .booking {
              position: absolute;
              top: 3px;
              bottom: 3px;
              border-radius: 6px;
              display: flex;
              align-items: center;
              font-size: 14px;
              gap: 4px;
              overflow: hidden;
              pointer-events: auto;
              padding: 0 4px;
              padding-left: 4px;
              z-index: 100;
              transition: padding-left 0.2s ease;
              will-change: transform;
              pointer-events: auto;
            }

      
body:not(.logged-in) #stickyHeader {
  display: none !important;
}
      
      
body:not(.logged-in) #calendar {
  pointer-events: none;
  filter: blur(2px);
  opacity: 0.6;
}

      
td.blocked {
  background: #eee !important;
  opacity: 0.6;
}


            .booking-layer {
              position: absolute;
              top: 0;
              left: 100%; /* ✅ statt 180px */
              width: calc(100vw - 180px); /* ✅ flexibel */
              height: 100%;
              pointer-events: none;
              z-index: 0;
            }

            .booking.block {
              background: repeating-linear-gradient(45deg, #444, #444 10px, #666 10px, #666 20px);
              color: white;
              font-weight: bold;
            }

            .booking .text {
              flex: 1;
              min-width: 0;
              max-width: calc(100% - 30px);
              overflow: hidden;
              white-space: nowrap;
              text-overflow: ellipsis;
              transition: transform 0.2s ease;
            }

            .booking:hover .text {
              transform: translateX(95px); /* Platz für Flags + Handle */
            }

            .flags {
              display: flex;
              gap: 4px;
              margin-right: 6px;
            }

            .no-breakfast-icon {
              position: relative;
              display: inline-block;
              width: 16px;
              height: 16px;
              vertical-align: middle;
            }

            .no-breakfast-icon span {
              position: absolute;
              top: 0;
              left: 0;
              font-size: 14px;
              line-height: 16px;
            }

      
.auth-only {
  display: none !important;
}

/* ✅ wenn eingeloggt */

body.logged-in .auth-only:not(.admin-only) {
  display: inline-block !important;
}


      
.admin-only {
  display: none !important;
}

body.admin .admin-only {
  display: inline-block !important;
}

      
            .no-breakfast-icon::after {
              content: "";
              position: absolute;

              top: 7px; /* 👈 weiter nach unten */
              left: 1px;

              width: 19px; /* 👈 etwas länger */
              height: 2px;

              background: rgba(241, 103, 103, 0.8);

              transform: rotate(-45deg);
              transform-origin: center;
            }
            .flag {
              width: 16px;
              height: 16px;
              display: flex;
              align-items: center;
              justify-content: center;
              font-size: 12px;
              border-radius: 4px;
              cursor: pointer;

              /* ✅ Box immer sichtbar */
              background: rgba(255, 255, 255, 0.9);
              border: 1px solid rgba(0, 0, 0, 0.6);

              /* ✅ Standard = ausgegraut */
              color: rgba(0, 0, 0, 0.3);
            }

            /* ✅ Aktiv */
            .flag:not(.off) {
              color: black;
            }

.move-blocked {
  opacity: 0.3 !important;
  background: #ddd !important;
}
      
      

            /* optional: Hover schöner */
            .flag:hover {
              transform: scale(1.1);
            }

            .booking .flags,
            .booking .drag-handle {
              opacity: 0 !important;
              pointer-events: none !important;
            }

            .booking .flags {
              position: absolute;
              left: 6px;
              top: 50%;
              transform: translateY(-50%);
              display: flex;
              gap: 4px;
            }

            .booking .drag-handle {
              position: absolute;
              left: 55px; /* 👈 Abstand NACH den Flags */
              top: 50%;
              transform: translateY(-50%);
            }


.booking.checked-in {
  background-image: 
    repeating-linear-gradient(
      135deg,
      rgba(0, 0, 0, 0.4),
      rgba(0, 0, 0, 0.4) 2px,
      transparent 6px,
      transparent 12px
    );
    
  background-blend-mode: multiply;
}

.paid-icon {
  position: relative;


  z-index: 2; /* WICHTIG → über dem Overlay */
}





      
            /* ✅ Hover: sichtbar */
            .booking:hover .flags,
            .booking:hover .drag-handle {
              opacity: 1 !important;
              pointer-events: auto !important;
            }

            td.blocked {
              background: #ddd !important;
              cursor: not-allowed !important;
            }

            .handle {
              position: absolute;
              top: 0;
              bottom: 0;
              opacity: 0.6;
              width: 3px;
              background: rgba(0, 0, 0, 0.5);
              cursor: ew-resize;
              z-index: 200;
              pointer-events: auto;
            }

            .handle:hover {
              opacity: 1;
            }

            .drag-handle {
              cursor: grab;
            }
            .drag-handle:active {
              cursor: grabbing;
            }
      
.move-handle {
  align-items: center;
  justify-content: center;
  width: 16px;
  height: 16px;
  background: rgba(0,0,0,0.2);
  border-radius: 4px;
  font-size: 12px;
}

            tr {
              position: relative;
            }

            .handle.right {
              right: 0;
              background: rgba(0, 0, 0, 0.5);
            }

            .handle.left {
              left: 0;
              background: rgba(0, 0, 0, 0.5);
            }

            .selected {
              background: black !important;
              color: white !important;
  opacity: 1 !important;
              border: 2px solid white;
            }

          
.selected .text,
.selected .price {
  color: white !important;
}


            #palette {
              position: fixed;
              bottom: 20px;
              left: 50%;
              transform: translateX(-50%);
              background: #fff;
              padding: 10px;
              border: 1px solid #ccc;
              display: none;
              z-index: 15000;
            }

            #palette div {
              width: 28px;
              height: 28px;
              display: inline-block;
              margin: 4px;
              cursor: pointer;
            }

            #legend {
              padding: 10px;
              font-size: 14px;
              background: #fff;
            }

            .booking .price {
              position: absolute;
              right: 8px;
              top: 50%;
              transform: translateY(-50%);
              white-space: nowrap;
              pointer-events: none;
              z-index: 10;
            }

          
            

            .switch-wrapper {
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 10px;
              margin-bottom: 10px;
              font-size: 14px;
            }

            /* Switch */
            .switch {
              position: relative;
              display: inline-block;
              width: 44px;
              height: 24px;
            }

            .switch input {
              opacity: 0;
              width: 0;
              height: 0;
            }

            .slider {
              position: absolute;
              cursor: pointer;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              background-color: #bbb;
              transition: 0.2s;
              border-radius: 24px;
            }

            .slider:before {
              position: absolute;
              content: "";
              height: 18px;
              width: 18px;
              left: 3px;
              bottom: 3px;
              background-color: white;
              transition: 0.2s;
              border-radius: 50%;
            }

            input:checked + .slider {
              background-color: #2196f3;
            }

            input:checked + .slider:before {
              transform: translateX(20px);
            }

            body.readonly .booking {
              pointer-events: none;
            }

            body.readonly .booking.allowed {
              pointer-events: auto;
            }

            body.readonly button:not(.allowed),
            body.readonly input:not(.allowed) {
              display: none !important;
            }

            #backupList button {
              width: 100%;
              margin-bottom: 6px;
            }

            #backupList::-webkit-scrollbar {
              width: 8px;
            }

#datePickerWrapper {
  position: relative;
  display: inline-block;
}

#datePickerWrapper input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

#datePickerWrapper label {
  display: inline-block;
  width: 44px;
  height: 44px;

  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fff;

  text-align: center;
  line-height: 44px;
  font-size: 20px;

  cursor: pointer;
}

#loginBlocker {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);

  z-index: 10000;

  display: none;
}

/* ✅ wenn NICHT eingeloggt */
body:not(.logged-in) #loginBlocker {
  display: block;
}


body:not(.logged-in) {
  overflow: hidden;
  height: 100vh;
  touch-action: none; /* ✅ blockiert Gesten */
}


      #loginBox {
        position: fixed;
        z-index: 99999;
      }

            #stickyHeader {

      position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 12000;
        background: white;

            }

      
#calendar {
  margin-top: 0; /* Desktop */

}


#calendar td {
  border-right: 2px solid #4e4e4e;
}

#calendar td:last-child {
  border-right: none;
}

      #topRightButtons {
  position: absolute;
  top: 10px;
  right: 20px;
  display: flex;
  gap: 12px;
}

body.moving .booking:hover .flags,
body.moving .booking:hover .drag-handle,
body.moving .booking:hover .move-handle {
  opacity: 0 !important;
  pointer-events: none !important;
}

body.moving .booking:hover .text {
  transform: none !important;
}


#swipeBackground {
  position: fixed;
  inset: 0;

  display: flex;
  align-items: center;

  font-size: 40px;
  font-weight: bold;

  color: black;

  z-index: 15000;
  pointer-events: none;

  overflow: hidden;
}

/* 👉 Text Element */
#swipeBackground span {
  position: absolute;
  white-space: nowrap;
  transition: transform 0.1s linear;
}



            #logContent::-webkit-scrollbar {
              width: 6px;
            }

            #logContent::-webkit-scrollbar-thumb {
              background: #bbb;
              border-radius: 4px;
            }

            #backupList::-webkit-scrollbar-thumb {
              background: #bbb;
              border-radius: 4px;
            }

@media (max-width: 600px) {

  
body {
  -webkit-tap-highlight-color: transparent;
}

  /* ✅ HEADER */
  thead th {
    font-size: 26px !important;
    line-height: 1.2;
    padding: 10px 4px;
    height: 80px;
  }

  thead th:not(:last-child)::before {
    width: 2px;
  }
  

  /* ✅ ZIMMER SPALTE */
  .room {
    position: sticky;
    left: 0;

    width: 65px;
    min-width: 65px;
    max-width: 65px;

    background: #fafafa;
    z-index: 1999;

    font-size: 0;
    text-align: center;
  }
  
 .paid-icon {
    font-size: 35px; /* 👈 hier kannst du spielen */
  }


  .room::after {
    content: attr(data-room-number);
    font-size: 24px;
    font-weight: bold;
  }

  /* ✅ ZELLEN */
  #calendar td {
    height: 55px;
  }

  /* ✅ BOOKINGS */
  .booking {
    font-size: 16px;
    border-radius: 6px;
  }

  /* ✅ CONTROLS CONTAINER */
  #controls {
    font-size: 16px;
    padding: 8px;
  }

  /* ✅ BUTTONS */
  #controls button {
    font-size: 35px;
    padding: 14px 22px;
    border-radius: 8px;
    background: #d7d7d7;
    color: black;
  }
  
  #groupInfoTitle{
    font-size: 75px;
  }

  #groupInfoBox {
    max-width: 90vw !important;
    width: 90vw !important;
    max-height: 750px !important;
    font-size: 35px;
      
  }
  #controls label {
    font-size: 35px;
    padding: 14px 22px;
    border-radius: 8px;
    background: #d7d7d7;
  }

  /* ✅ BUTTON ACTIVE */
  #controls button:active,
  #controls label:active {
    background: #828282;
  }
  

  #controls button {
    display: none;
  }

  /* ✅ LOGIN OK */
  body.logged-in #controls button.allowed.auth-only {
    display: inline-block !important;
  }

  /* ✅ ADMIN */
  body.logged-in.admin #controls button.admin-only {
    display: inline-block !important;
  }

  /* ✅ LEGENDE */
  #legend {
    font-size: 32px;
  }

  #legend div {
    font-size: 32px;
    padding: 12px 20px;
    margin: 3px;
  }

  /* ✅ SWIPE TEXT */
  #swipeHint {
    font-size: 32px;
    padding: 20px 30px;
  }

  /* ✅ BOOKING LAYER BREITE */
  .booking-layer {
    width: calc(100vw - 65px);
  }
     
  #newBookingBtn,
  #weekUp,
  #weekDown,
  #undo {
    display: none !important;
  }
}
 
             
            
    </style>
  </head>

  <body>
    <div id="loginBlocker"></div>
    
<div id="swipeBackground"></div>

 

<table id="calendar"></table>




  

    <div
      id="loginBox"
      style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 20px;
        border: 1px solid #ccc;
        z-index: 50000;
      ">
      <h3>Login</h3>

      <input type="text" id="login_email" placeholder="Benutzername" /><br /><br />
      <input type="password" id="login_password" placeholder="Passwort" /><br /><br />

      <button onclick="login()">Login</button>
    </div>
    <div
      id="groupInfoBox"
      style="
        position: fixed;
        top: 55%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 20px;
        border: 1px solid #ccc;
        z-index: 60000;
        max-width: 30vw;
        width: 30vw;
        max-height: 650px;
        overflow-y: auto;
        display: none;
        border-radius: 10px;
      ">
      <h3 id="groupInfoTitle">Gruppe</h3>

      <div id="groupInfoFiles"></div>

      <br />

      <div
        id="uploadArea"
        style="border: 2px dashed #ccc; padding: 20px; text-align: center; border-radius: 10px; cursor: pointer">
        Dateien hier reinziehen oder klicken
        <input type="file" id="fileInput" multiple style="display: none" />
      </div>

      <br />
      <button onclick="closeGroupInfo()">Schließen</button>
    </div>
    <div id="stickyHeader">
      <div id="controls">
        <button onclick="changeWeek(-1)" id="weekDown" class="auth-only">◀ Woche</button>
        <button onclick="changeWeek(1)" id="weekUp" class="auth-only">Woche ▶</button>


<div id="datePickerWrapper" class="allowed">
  <input type="date" id="datePicker" class="allowed">
  <label for="datePicker" class="allowed">📅</label>
</div>


        <button onclick="undo()" id="undo" class="auth-only" title="Rückgängig (Strg+Z)">↶</button>
        <button id="backupBtn" onclick="alert('Backup kommt später')" class="auth-only admin-only">Backup</button>
        <button
          class="auth-only"
          id="newBookingBtn"
          onclick="event.stopPropagation(); openNewBooking()"
          style="position: absolute; left: 50%; transform: translateX(-50%)">
          Neue Buchung anlegen
        </button>
  <div id="topRightButtons">
  <button id="logOverviewBtn" onclick="event.stopPropagation(); openLogOverview();" class="auth-only admin-only">🗑️ Gelöscht</button>
  <button id="logoutBtn" class="auth-only">Logout</button>
</div>
        <div
          id="backupList"
             class="overlay-box"
          style="
            position: fixed !important;

            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);

            background: #fff;
            border: 1px solid #ccc;
            padding: 20px;

            max-height: 400px;
            min-width: 300px;
            max-width: 400px;
            overflow-y: auto;
            overflow-x: auto;

            display: none;
            z-index: 10001;

            border-radius: 10px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
          "></div>

        <div
          id="logOverview"
          style="
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            padding: 20px;
            border: 1px solid #ccc;
            max-height: 500px;
            width: 500px;
            overflow: auto;
            display: none;
            z-index: 20000;
            border-radius: 10px;
          ">
          <b>Gelöschte Buchungen</b><br /><br />

         
<div style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px">

  <input id="logNameFilter" placeholder="Name" />

  <button onclick="applyLogFilter()">Filtern</button>
  <button onclick="resetLogFilter()">Reset</button>

</div>


          <div id="logOverviewContent"></div>

          <br />
          <button onclick="closeLogOverview()">Schließen</button>
        </div>

        <div
          id="overlay"
          style="
            position: fixed !important;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 10000;
          "></div>
      </div>
      <div id="legend"></div>
    </div>
    <div id="palette"></div>
    <div
      id="bookingForm"
      style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 20px;
        border: 1px solid #ccc;
        z-index: 999999;
        display: none;
        width: 300px;
      ">
      <h3 id="formTitle">Neue Buchung</h3>

      <div class="switch-wrapper">
        <span>Einzel</span>

        <label class="switch">
          <input type="checkbox" id="toggleGroup" />
          <span class="slider"></span>
        </label>

        <span>Gruppe</span>
      </div>

      <div id="singleForm">
        <label>Zimmerkategorie</label><br />
        <select id="f_guests"></select
        ><br /><br />

        <label>Name</label><br />
        <input type="text" id="f_name" /><br /><br />

        <label>Firma</label><br />
        <input type="text" id="f_company" /><br /><br />

        <label>Anreise</label><br />
        <input type="date" id="f_start" /><br /><br />

        <label>Abreise</label><br />
        <input type="date" id="f_end" /><br /><br />

        <label>Preis (€)</label><br />
        <input type="text" id="f_price" /><br /><br />

        <label>Kommentar</label><br />
        <input type="text" id="f_comment" /><br /><br />

        <label>Frühstück</label><br />
        <select id="f_breakfast">
          <option value="true">Ja</option>
          <option value="false">Nein</option></select
        ><br /><br />

        <label>Gruppe</label><br />
        <select id="f_group"></select
        ><br /><br />

        <button onclick="saveBooking()">Speichern</button>
        <button onclick="closeForm()">Abbrechen</button>
      </div>
      <div id="groupForm" style="display: none">
        <label>Gruppenname</label><br />
        <input type="text" id="g_name" required /><br /><br />

        <div id="groupCategories"></div>
        <br>
        
        <label style="display:flex;align-items:center;gap:6px;">
          <input type="checkbox" id="g_floorPriority">
            EG zuerst
          </label>
        <br>

        <label>Anreise</label><br />
        <input type="date" id="g_start" required /><br /><br />

        <label>Abreise</label><br />
        <input type="date" id="g_end" required /><br /><br />

        <button onclick="submitGroupBooking()">Weiter</button>
      </div>
    </div>

    <div
      id="bookingInfo"
      style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #fff;
        padding: 20px;
        border: 1px solid #ccc;
        z-index: 999999;
        display: none;
        width: 320px;
      ">
      <h3>Buchungsdetails</h3>

      <div id="infoContent"></div>

      <br />

      <button id="logBtn" onclick="toggleLog()" style="display: none">Verlauf</button>

     

      <div
        id="logContent"
        style="
          display: none;
          max-height: 220px;
          overflow-y: auto;
          overflow-x: hidden;
          border-top: 1px solid #ccc;
          padding-top: 8px;
          padding-right: 6px;
          margin-top: 6px;
          background: #fafafa;
          border-radius: 6px;
        "></div>

 
      <button onclick="closeInfo()">Schließen</button>
    </div>
    <script>
      const rooms = [
        "101 - DZ B",
        "102 - DZ B",
        "103 - DZ B",
        "104 - DZ B",
        "201 - DZ B",
        "202 - DZ B",

function calculateAvailability(start, end, data) {

  let tempUsed = new Set();
  let errors = [];

  for (let item of data) {
    let count = item.count;

    for (let i = 0; i < count; i++) {

      let found = false;

      for (let row = 0; row < rooms.length; row++) {

        if (tempUsed.has(row)) continue;

        let roomName = rooms[row];
        if (!roomName || roomName.trim() === "") continue;

        if (!canUseRoomSimple(roomName, item.type)) continue;

        if (overlapDates(row, start, end, -1)) continue;

        tempUsed.add(row);
        found = true;
        break;
      }

      if (!found) {
        errors.push({
          type: item.type,
          needed: 1
        });
      }
    }
  }

  if (errors.length > 0) {
    return { ok: false, errors };
  }

  return { ok: true };
}

      function canUseRoomForCheck(roomName, type) {
        let t = roomName.split(" - ")[1] || "";

        if (type === "EZ") {
          return true;
        }

        if (type === "DZ") {
          return t.includes("DZ");
        }

        if (type === "DZ B") {
          return t.includes("DZ B");
        }

        if (type === "EZ B") {
          return t.includes("B");
        }

        if (type === "3er") {
          return t.includes("3") || t.includes("4");
        }

        if (type === "4er") {
          return t.includes("4");
        }

        return false;
      }

  let { start, end } = placement;

  // ✅ richtige Gruppen wählen
  let rawGroups = placement.floorPriority
    ? getFloorPriorityGroups()
    : getBuildingPriorityGroups();

  // ✅ in echte room-Indices umwandeln
  let groups = rawGroups.map(g =>
    g.map(num => rooms.findIndex(r => r.startsWith(num + " ")))
     .filter(i => i !== -1)
  );

  // ✅ HAUPTLOOP
  for (let group of groups) {

    for (let row of group) {

      let roomName = rooms[row];
      if (!roomName || roomName.trim() === "") continue;

      // ✅ schon belegt?
      if (overlapDates(row, start, end, -1)) continue;

      // ✅ passenden Typ suchen
      let item = placement.data.find(d =>
        d.count > 0 && canUseRoomSimple(roomName, d.type)
      );

      if (!item) continue;

      // ✅ BUCHUNG ERSTELLEN
      let booking = await assignRoom(row, item.type, false, true);
      let counter = 0;
      if (booking) {
        bookings.push(booking);
        counter++;
        
        if (counter % 3 === 0) {
          await new Promise(r => setTimeout(r, 0));
        }
      }

      // ✅ fertig?
      if (placement.data.every(d => d.count === 0)) break;
    }

    if (placement.data.every(d => d.count === 0)) break;
  }

  draw();
  updatePlacementBox();

  // ✅ WENN fertig → speichern
  let done = placement.data.every(d => d.count === 0);

  if (done) {
    await syncGroupToDB();
    finishPlacement();
  }
}

      async function resize(e, i, dir) {
        if (!isEditAllowed()) return;

        if (e.button !== 0) return; // ✅ nur Linksklick erlaubt
        e.preventDefault();

        drag = null;
        resizing = true;

        let b = bookings[i];
        let weekStart = normalizeDate(startOfWeek(current));
        let baseStart = new Date(b.start);
        let baseEnd = new Date(b.end);
        let lastMouseX = e.clientX;

        if (dir === -1) {
          let base = normalizeDate(baseStart);
          let week = normalizeDate(weekStart);

          // ✅ nur blockieren wenn wirklich VOR der Woche
          if (base < week) {
            return;
          }
        }
        // ✅ sichtbaren Start berechnen
        let visibleStart = baseStart < weekStart ? new Date(weekStart) : new Date(baseStart);

        let rowEl = document.querySelectorAll("tr")[b.row + 1];
        let cell = rowEl.querySelector("td:not(.room)");

        let dayWidth = cell.getBoundingClientRect().width;

        let el = document.querySelector(`.booking[data-index='${i}']`);

        let rect = el.getBoundingClientRect();

        let layer = el.parentElement;
        let layerRect = layer.getBoundingClientRect();

        let resizeState = {
          mouseStartX: e.clientX,
          startWidth: rect.width,
          startLeft: rect.left - layerRect.left // ✅ RELATIV!
        };

        if (!el) return;

        const resizeMove = (ev) => {
          if (!resizing) return;

          lastMouseX = ev.clientX; // ✅ HIER!

          let deltaX = ev.clientX - resizeState.mouseStartX;

          el.style.transform = "none";

          if (dir === 1) {
            el.style.width = resizeState.startWidth + deltaX + "px";
          }

          if (dir === -1) {
            el.style.left = resizeState.startLeft + deltaX + "px";
            el.style.width = resizeState.startWidth - deltaX + "px";
          }
        };

        const resizeEnd = async (ev) => {
          saveHistory();

          resizing = false;
          drag = null;
          document.body.style.userSelect = "auto";

          let weekStart = normalizeDate(startOfWeek(current));

          let rowEl = document.querySelectorAll("tr")[b.row + 1];
          let cells = rowEl.querySelectorAll("td:not(.room)");

          let mouseX = lastMouseX;

          let closestSlot = 0;
          let closestDistance = Infinity;

          // ✅ 14 Slots berechnen (2 pro Tag)
          cells.forEach((cell, dayIndex) => {
            let rect = cell.getBoundingClientRect();

            for (let half = 0; half < 2; half++) {
              let center;

              if (half === 0) {
                center = rect.left + rect.width * 0.25;
              } else {
                center = rect.left + rect.width * 0.75;
              }

              let slotIndex = dayIndex * 2 + half;
              let distance = Math.abs(mouseX - center);

              if (distance < closestDistance) {
                closestDistance = distance;
                closestSlot = slotIndex;
              }
            }
          });

          let currentStartSlot = getSlotFromDate(b.start, weekStart, false);
          let currentEndSlot = getSlotFromDate(b.end, weekStart, true);

          // ✅ PARITÄT ZUERST (ganz wichtig!)
          if (dir === -1 && closestSlot % 2 === 1) {
            closestSlot--;
          }

          if (dir === 1 && closestSlot % 2 === 0) {
            closestSlot++;
          }

          // ✅ Mindestabstand erzwingen (JETZT, nicht vorher!)
          if (dir === -1 && currentEndSlot - closestSlot < 2) {
            closestSlot = currentEndSlot - 2;
          }

          if (dir === 1 && closestSlot - currentStartSlot < 2) {
            closestSlot = currentStartSlot + 2;
          }

          // ✅ PARITÄT NOCHMAL SICHERN (weil wir Slot verändert haben!)
          if (dir === -1 && closestSlot % 2 === 1) {
            closestSlot--;
          }

          if (dir === 1 && closestSlot % 2 === 0) {
            closestSlot++;
          }

          // ✅ CLAMP GANZ ZUM SCHLUSS
          closestSlot = Math.max(0, Math.min(13, closestSlot));

          if (dir === -1) {
            let newStart = new Date(weekStart);
            newStart.setDate(weekStart.getDate() + Math.floor(closestSlot / 2));

            // ✅ HIER setzen!
            newStart.setHours(CHECKIN_HOUR, 0, 0, 0);

            if (!overlapDates(b.row, newStart, baseEnd, i)) {
              let oldStart = b.start;

              b.start = newStart.toISOString();

              render();

          const user = currentUser;

const { error } = await supa

if (error) {

}

logBookingAction({

  field: "start",

  bookingAt: b.end
});

            }
          }

          if (dir === 1) {
            let newEnd = new Date(weekStart);
            newEnd.setDate(weekStart.getDate() + Math.floor(closestSlot / 2));

            // ✅ HIER setzen!
            newEnd.setHours(CHECKOUT_HOUR, 0, 0, 0);

});

            }
          }

          // ✅ RESET

          el.style.transform = "none";
          el.style.left = "";
          el.style.width = "";

          document.removeEventListener("mousemove", resizeMove);

          resizing = false;
          drag = null;
        };

        document.addEventListener(
          "mouseup",
          (ev) => {

          },

        );

      function getSlotFromDate(date, weekStart, isEnd = false) {

        return slot;

     function calculateGroupStats(data, mode = "input") {
  let stats = {
    ez: 0,
    dz: 0,
    er3: 0,
    er4: 0,
    guests: 0
  };

  if (mode === "input") {
    data.forEach((d) => {
      let type = d.type;
      let count = Number(d.count) || 0;

      applyStats(stats, type, count);
    });
  }

  if (mode === "bookings") {
    bookings.forEach((b) => {
      if (b.group_id !== data) return;

      let type = b.guests;

      applyStats(stats, type, 1);
    });
  }

  return stats;
}

function applyStats(stats, type, count) {
  if (type === "EZ" || type === "EZ B") {
    stats.ez += count;
    stats.guests += count;
  }

  else if (type === "DZ" || type === "DZ B") {
    stats.dz += count;
    stats.guests += count * 2;
  }

  else if (type === "3er") {
    stats.er3 += count;
    stats.guests += count * 3;
  }

  else if (type === "4er") {
    stats.er4 += count;
    stats.guests += count * 4;
  }
}

            .from("group-files")
            .upload(filePath, file);

          if (uploadError) {
            console.error("Upload Fehler:", uploadError);
            continue;

          // ✅ Signed URL holen
          const { data: urlData, error: urlError } = await supa.storage
            .from("group-files")
            .createSignedUrl(filePath, 60 * 60);

          if (urlError) {

            continue;

          let url = urlData.signedUrl;

          // ✅ DB speichern
          await supa.from("group_files").insert([
            {
              group_id: groupId,
              name: file.name,
              url: url
            }
          ]);
        }

      function handleRealtimeUpdate(payload) {
        const { eventType, new: newRow, old: oldRow } = payload;

        if (eventType === "INSERT") {
          bookings.push({ ...newRow, row: Number(newRow.row) });
        }

        if (eventType === "UPDATE") {
          bookings = bookings.map((b) => (b.id == newRow.id ? { ...newRow, row: Number(newRow.row) } : b));
        }

        if (eventType === "DELETE") {
          bookings = bookings.filter((b) => b.id !== oldRow.id);
        }

        render();
      }

   async function deleteGroupInWeek(groupId) {
  if (!isEditAllowed()) return;

  let weekStart = normalizeDate(startOfWeek(current));
  let weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 7);

  let toDelete = bookings.filter((b) => {
    if (b.group_id !== groupId) return false;

    let s = new Date(b.start);
    let e = new Date(b.end);

    return s < weekEnd && e > weekStart;
  });

  if (toDelete.length === 0) {
    alert("Keine Buchungen in dieser Woche");
    return;
  }

  saveHistory();

  let ids = toDelete.map((b) => b.id);

  // ✅ lokal entfernen
  bookings = bookings.filter((b) => !ids.includes(b.id));

  render();

  // ✅ DB: Buchungen löschen
  await supa.from("bookings").delete().in("id", ids);

  // ✅ NEU: prüfen ob Gruppe noch Buchungen hat
  const { data: remaining, error } = await supa
    .from("bookings")
    .select("id")
    .eq("group_id", groupId)
    .limit(1);

  if (error) {
    console.error("Fehler beim Prüfen der Gruppe:", error);
    return;
  }

  // ✅ wenn KEINE Buchungen mehr → Gruppe löschen
  if (!remaining || remaining.length === 0) {
    await supa.from("groups").delete().eq("id", groupId);

    // ✅ auch lokal entfernen
    delete groupsMap[groupId];

  }
}

      function getUsedColorsInRange(start, end) {
        let usedColors = new Set();

        let currentDate = normalizeDate(start);

        while (currentDate < end) {
          let weekStart = normalizeDate(startOfWeek(currentDate));
          let weekEnd = new Date(weekStart);
          weekEnd.setDate(weekStart.getDate() + 7);

          bookings.forEach((b) => {
            let group = groupsMap[b.group_id];
            if (!group) return;

            let s = new Date(b.start);
            let e = new Date(b.end);

            s.setHours(0, 0, 0, 0);
            e.setHours(0, 0, 0, 0);

            if (s < weekEnd && e > weekStart) {
              usedColors.add(group.color);
            }
          });

          currentDate.setDate(currentDate.getDate() + 7);
        }

        return usedColors;
      }

      function getGroupsInWeek() {

  let result = [];
  let seen = new Set();

  let weekStart = normalizeDate(startOfWeek(current));
  let weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 7);

  bookings.forEach((b) => {

    if (!b.group_id) return;

    if (seen.has(b.group_id)) return;

    let s = normalizeDate(b.start);
    let e = normalizeDate(b.end);

    if (s < weekEnd && e > weekStart) {

      let g = groupsMap[b.group_id];

      if (g) {
        result.push({
          id: g.id,
          name: g.name,
          color: g.color
        });

        seen.add(b.group_id);
      }
    }
  });

  return result;
}

      function canUseRoomSimple(roomName, type) {

  let t = roomName.split(" - ")[1] || "";

  if (type === "EZ") return true;
  if (type === "EZ B") return t.includes("B");

  if (type === "DZ") return t.includes("DZ");
  if (type === "DZ B") return t.includes("DZ B");

  if (type === "3er") return t.includes("3") || t.includes("4");
  if (type === "4er") return t.includes("4");

  return false;
}

async function saveBatchBookings(list) {
  if (!list.length) return;

  isLocalInsert = true;
  lastChangeTime = Date.now();

  const { data: userData } = await supa.auth.getUser();
  const user = userData.user;

  if (!user) {
    alert("Nicht eingeloggt!");
    return;
  }

  let clean = list.map(b => {
    let copy = { ...b };
    delete copy.id;

    return {
      ...copy,
      user_id: user.id
    };
  });

  const { data, error } = await supa
    .from("bookings")
    .insert(clean)
    .select();

  if (error) {
    console.error(error);
    alert("Fehler beim Speichern");
    isLocalInsert = false;
    return;
  }

  if (data) {
    let realIndex = 0;

    for (let i = 0; i < bookings.length; i++) {
      if (String(bookings[i].id).startsWith("tmp_")) {
        if (data[realIndex]) {
          bookings[i] = data[realIndex];
          realIndex++;
        }
      }
    }

    render();
  }

  isLocalInsert = false;
}

      function debounce(fn, delay) {
        let t;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...args), delay);
        };
      }


const calendar = document.getElementById("calendar");
const bg = document.getElementById("swipeBackground");

calendar.addEventListener("touchstart", (e) => {
  
 startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;

  isSwiping = false;


  calendar.style.transition = "none";
});


calendar.addEventListener("touchmove", (e) => {

  let currentX = e.touches[0].clientX;
  let currentY = e.touches[0].clientY;

  let diffX = currentX - startX;
  let diffY = currentY - startY;

  // ✅ kleine Bewegungen ignorieren
  if (Math.abs(diffX) < 15) return;

  // ✅ vertikales Scrollen blockt Swipe
  if (!isSwiping) {
    if (Math.abs(diffY) > Math.abs(diffX)) return;

    isSwiping = true;
    calendar.style.transition = "none";
  }

  if (!isSwiping) return;

 calendar.style.transform = `translateX(${diffX}px) translateZ(0)`;

  // ✅ TEXT LOGIK
  let width = window.innerWidth;
  let progress = Math.min(Math.abs(diffX) / width, 1);

  // 👉 Text setzen
  if (diffX < 0) {
    bg.innerHTML = `<span style="
      position:absolute;
      left:${width - Math.abs(diffX)}px;
      font-size:40px;
      font-weight:bold;
    ">Nächste<br>Woche</span>`;
  } else {
    bg.innerHTML = `<span style="
      position:absolute;
      right:${width - Math.abs(diffX)}px;
      font-size:40px;
      font-weight:bold;
    ">Vorherige<br>Woche</span>`;
  }

});

calendar.addEventListener("touchend", () => {

   if (!isSwiping) return;
  isSwiping = false;

  let transform = calendar.style.transform;
  let diff = 0;

  if (transform.includes("translateX")) {
    diff = parseFloat(transform.replace(/translateX\(([-0-9.]+)px\)/, "$1"));
  }

  let threshold = 500;

  calendar.style.transition = "transform 0.2s ease-out";

  if (diff < -threshold) {
    calendar.style.transform = "translateX(-100%)";

    setTimeout(() => {
      changeWeek(1);
      resetCalendarPosition();
      bg.innerHTML = ""; // ✅ hier auch sicherheitshalber
    }, 200);

  } else if (diff > threshold) {
    calendar.style.transform = "translateX(100%)";

    setTimeout(() => {
      changeWeek(-1);
      resetCalendarPosition();
      bg.innerHTML = ""; // ✅ hier auch
    }, 200);

  } else {
    calendar.style.transform = "translateX(0)";
    bg.innerHTML = ""; // ✅ hier wichtig
  }

});

      html,

      body.select-mode {
        cursor: crosshair !important;
      }

      body.select-mode .booking,
      body.select-mode .booking * {
        cursor: crosshair !important;
      }

      .half::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        border-left: 1px dashed #bbb;
      }
      .half {
        pointer-events: auto;
      }
      .booking {
        position: absolute;
        top: 3px;
        bottom: 3px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        font-size: 14px;
        gap: 4px;
        overflow: hidden;
        pointer-events: auto;
        padding: 0 4px;
        padding-left: 4px;
        z-index: 100;
        transition: padding-left 0.2s ease;
        will-change: transform;
        pointer-events: auto;
      }

      .booking-layer {
        position: absolute;
        top: 0;
        left: 100%; /* ✅ statt 180px */
        width: calc(100vw - 180px); /* ✅ flexibel */
        height: 100%;
        pointer-events: none;
      }

      .booking.block {
        background: repeating-linear-gradient(45deg, #444, #444 10px, #666 10px, #666 20px);
        color: white;
        font-weight: bold;
      }

      .booking .text {
        flex: 1;
        min-width: 0;
        max-width: calc(100% - 30px);
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        transition: transform 0.2s ease;
      }

      .booking:hover .text {
        transform: translateX(70px); /* Platz für Flags + Handle */
      }

      .flags {
        display: flex;
        gap: 4px;
        margin-right: 6px;
      }

      .no-breakfast-icon {
        position: relative;
        display: inline-block;
        width: 16px;
        height: 16px;
        vertical-align: middle;
      }

      .no-breakfast-icon span {
        position: absolute;
        top: 0;
        left: 0;
        font-size: 14px;
        line-height: 16px;
      }

      .no-breakfast-icon::after {
        content: "";
        position: absolute;

        top: 7px; /* 👈 weiter nach unten */
        left: 1px;

        width: 19px; /* 👈 etwas länger */
        height: 2px;

        background: rgba(241, 103, 103, 0.8);

        transform: rotate(-45deg);
        transform-origin: center;
      }
      .flag {
        width: 16px;
        height: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        border-radius: 4px;
        cursor: pointer;

        /* ✅ Box immer sichtbar */
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(0, 0, 0, 0.6);

        /* ✅ Standard = ausgegraut */
        color: rgba(0, 0, 0, 0.3);
      }

      /* ✅ Aktiv */
      .flag:not(.off) {
        color: black;
      }

      /* optional: Hover schöner */
      .flag:hover {
        transform: scale(1.1);
      }

      .booking .flags,
      .booking .drag-handle {
        opacity: 0 !important;
        pointer-events: none !important;
      }

      .booking .flags {
        position: absolute;
        left: 6px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        gap: 4px;
      }

      .booking .drag-handle {
        position: absolute;
        left: 55px; /* 👈 Abstand NACH den Flags */
        top: 50%;
        transform: translateY(-50%);
      }

      /* ✅ Hover: sichtbar */
      .booking:hover .flags,
      .booking:hover .drag-handle {
        opacity: 1 !important;
        pointer-events: auto !important;
      }

      td.blocked {
        background: #ddd !important;
        cursor: not-allowed !important;
      }

      .handle {

        bottom: 0;

        z-index: 200;

      .handle:hover {

      .drag-handle {
        cursor: grab;

        cursor: grabbing;

      tr {

      /* Switch */
      .switch {

        width: 44px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #bbb;
        transition: 0.2s;
        border-radius: 24px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.2s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: #2196f3;
      }

      input:checked + .slider:before {
        transform: translateX(20px);
      }

      body.readonly .booking {
        pointer-events: none;

      async function login() {
        let username = document.getElementById("login_email").value.trim();
        let password = document.getElementById("login_password").value;

        // ✅ 1. Username → Email holen
        const { data, error } = await supa.from("user_roles").select("email").ilike("username", username).single();

        if (error || !data) {
          alert("Benutzer nicht gefunden");
          console.error(error);
          return;
        }

        // ✅ 2. Login mit Email + Passwort
        const { error: loginError } = await supa.auth.signInWithPassword({
          email: data.email,
          password: password

        if (loginError) {
          alert("Falsches Passwort");
          console.error(loginError);
          return;

      function applyLogFilter() {
        let userFilter = document.getElementById("logUserFilter").value.toLowerCase();
        let roomFilter = document.getElementById("logRoomFilter").value.toLowerCase();

        let from = document.getElementById("logDateFrom").value;
        let to = document.getElementById("logDateTo").value;

        let filtered = allLogs.filter((log) => {
          let userName = (userMap[log.user_id] || "").toLowerCase();
          let room = (log.room || "").toLowerCase();

          // ✅ USER
          if (userFilter && !userName.includes(userFilter)) return false;

          // ✅ ROOM
          if (roomFilter && !room.includes(roomFilter)) return false;

          // ✅ DATE FROM
          if (from) {
            let d = normalizeDate(log.created_at);
            if (normalizeDate(d) < normalizeDate(from)) return false;
          }

          // ✅ DATE TO
          if (to) {
            let d = normalizeDate(log.created_at);
            let toDate = normalizeDate(to);

            if (d > toDate) return false;
          }

          return true;
        });

        renderLogList(filtered);

      function renderLogList(logs) {
        const content = document.getElementById("logOverviewContent");

        if (!logs.length) {

          return;

        let html = "";

        logs.forEach((log) => {
          let userName = userMap[log.user_id] || "Unbekannt";
          let room = log.room || "-";

          let dt = new Date(log.created_at + "Z");
          let time = dt.toLocaleString("de-DE");

          html += `

      function hasFreePreferredRoom(start, end, type) {
        return rooms.some((room, row) => {
          if (!isThreeDigitRoom(room)) return false;

          if (overlapDates(row, start, end, -1)) return false;

          // ✅ Kategorie prüfen
          let allowed = getGuestOptions(room);
          if (!allowed.includes(type)) return false;

          // ✅ Jetzt auch EZ/DZ Speziallogik beachten

          // EZ
          if (type === "EZ") {
            let isPref = isPreferredEZRoom(room);
            let hasPref = hasFreePreferredEZ(start, end);

            if (hasPref && !isPref) return false;
          }

          // DZ
          if (type === "DZ") {
            let levels = getFreeDZLevels(start, end);

            if (levels.normalFree && !isNormalDZ(room)) return false;
            if (!levels.normalFree && levels.deluxeFree && !isDeluxeDZ(room)) return false;
            if (!levels.normalFree && !levels.deluxeFree && levels.multiFree && !isMultiDZ(room)) return false;
            if (!levels.normalFree && !levels.deluxeFree && !levels.multiFree && !isSmallDZ(room)) return false;
          }

          return true;
        });
      }

      function hasFreePreferredEZ(start, end) {
        return rooms.some((room, row) => {
          if (!isPreferredEZRoom(room)) return false;

          return !overlapDates(row, start, end, -1);
        });
      }

      function getGuestOptions(roomName) {
        let type = roomName.split(" - ")[1] || "";

        let options = ["EZ"];

        // ✅ EZ
        if (type.includes("EZ")) {
          // bleibt nur EZ
        }

        if (type.includes("EzD")) {
          options.push("DZ");
        }

        // ✅ EZ B
        if (type.includes("EZ B")) {
          options = ["EZ", "EZ B"];
        }

        // ✅ DZ
        else if (type.includes("DZ")) {
          options.push("DZ");
        }

        // ✅ DZ B
        if (type.includes("DZ B")) {
          options = ["EZ", "DZ", "EZ B", "DZ B"];
        }

        // ✅ 3er
        if (type.includes("3")) {
          options = ["EZ", "DZ", "3er"];
        }

        // ✅ 3er B
        if (type.includes("3") && type.includes("B")) {
          options = ["EZ", "DZ", "3er", "EZ B", "DZ B"];
        }

        // ✅ 4er
        if (type.includes("4")) {
          options = ["EZ", "DZ", "3er", "4er"];
        }

        // ✅ 4er B
        if (type.includes("4") && type.includes("B")) {
          options = ["EZ", "DZ", "3er", "4er", "EZ B", "DZ B"];
        }

        return options;
      }

      function calculateAvailability(start, end, data) {
        let freeRooms = [];

        // ✅ freie Zimmer sammeln
        for (let i = 0; i < rooms.length; i++) {
          if (!overlapDates(i, start, end, -1)) {
            freeRooms.push(rooms[i]);
          }
        }

        let count = {
          "4er": freeRooms.filter((r) => {
            let type = r.split(" - ")[1] || "";
            return type.includes("4");
          }).length,

          "3er": freeRooms.filter((r) => {
            let type = r.split(" - ")[1] || "";
            return type.includes("3") || type.includes("4");
          }).length,

          DZ: freeRooms.filter((r) => {
            let type = r.split(" - ")[1] || "";
            return type.includes("DZ");
          }).length,

          EZ: freeRooms.length
        };

        let need = {
          "4er": data.find((d) => d.type === "4er")?.count || 0,
          "3er": data.find((d) => d.type === "3er")?.count || 0,
          DZ: data.find((d) => d.type === "DZ")?.count || 0,
          EZ: data.find((d) => d.type === "EZ")?.count || 0
        };

        let errors = [];

        // ✅ 4er

        let used4er = Math.min(count["4er"], need["4er"]);

        if (count["4er"] < need["4er"]) {
          errors.push({
            type: "4er",
            free: count["4er"],
            needed: need["4er"]
          });
        }

        // ✅ 2. 3er (NUR TATSÄCHLICH GENUTZTE 4er abziehen)
        let available3er = count["3er"] - used4er;
        let used3er = Math.min(available3er, need["3er"]);

        if (available3er < need["3er"]) {
          errors.push({
            type: "3er",
            free: available3er,
            needed: need["3er"]
          });
        }

        // ✅ 3. DZ
        let availableDZ = count["DZ"] - used3er - used4er;
        let usedDZ = Math.min(availableDZ, need["DZ"]);

        if (availableDZ < need["DZ"]) {
          errors.push({
            type: "DZ",
            free: availableDZ,
            needed: need["DZ"]
          });
        }

        // ✅ 4. EZ
        let availableEZ = count["EZ"] - usedDZ - used3er - used4er;

        if (availableEZ < need["EZ"]) {
          errors.push({
            type: "EZ",
            free: availableEZ,
            needed: need["EZ"]
          });
        }

        if (errors.length > 0) {
          return {
            ok: false,
            errors: errors
          };
        }

        return { ok: true };
      }

      function canUseRoomForCheck(roomName, type) {
        let t = roomName.split(" - ")[1] || "";

        // ✅ EZ → ALLES erlaubt was grundsätzlich belegbar ist
        if (type === "EZ") {
          return true;
        }

        // ✅ DZ → alle mit DZ im Namen
        if (type === "DZ") {
          return t.includes("DZ");
        }

        // ✅ DZ B → nur echte Balkon-DZ
        if (type === "DZ B") {
          return t.includes("DZ B");
        }

        // ✅ EZ B → alles mit B
        if (type === "EZ B") {
          return t.includes("B");
        }

        // ✅ 3er → alles mit 3 ODER 4
        if (type === "3er") {
          return t.includes("3") || t.includes("4");
        }

        // ✅ 4er → nur mit 4
        if (type === "4er") {
          return t.includes("4");
        }

        return false;
      }

      function normalizeDate(d) {
        let x = new Date(d);

      function startOfWeek(d) {
        let x = new Date(d);
        let day = x.getDay() || 7;
        if (day != 1) x.setDate(x.getDate() - day + 1);
        return x;
      }

      function getCurrentDZLevel(start, end) {
        let ignore = shouldIgnoreFloorSeparation(start, end);

        let levels = [];

        // ✅ Phase 1: 3-stellig nur wenn aktiv
        if (!ignore) {
          levels.push(
            (r) => isThreeDigitRoom(r) && isNormalDZ(r),
            (r) => isThreeDigitRoom(r) && isDeluxeDZ(r),
            (r) => isThreeDigitRoom(r) && isMultiDZ(r),
            (r) => isThreeDigitRoom(r) && isSmallDZ(r)
          );
        }

        // ✅ Phase 2: ALLE
        levels.push(
          (r) => isNormalDZ(r),
          (r) => isDeluxeDZ(r),
          (r) => isMultiDZ(r),
          (r) => isSmallDZ(r)
        );

        for (let check of levels) {
          let found = rooms.some((room, row) => {
            if (!check(room)) return false;
            if (overlapDates(row, start, end, -1)) return false;
            return true;
          });

          if (found) return check;
        }

        return null;
      }

        drawLegend();
      }

      function getCurrent3erLevel(start, end) {
        let ignore = shouldIgnoreFloorSeparation(start, end);

        let levels = [];

        if (!ignore) {
          levels.push((r) => isThreeDigitRoom(r) && is3erRoom(r));
        }

        levels.push((r) => is3erRoom(r));

        for (let check of levels) {
          let found = rooms.some((room, row) => {
            if (!check(room)) return false;
            if (overlapDates(row, start, end, -1)) return false;
            return true;
          });

          if (found) return check;
        }

        return null;
      }

      function is3erRoom(room) {
        let type = getRoomType(room);
        return type.includes("3");
      }

      function shouldIgnoreFloorSeparation(start, end) {
        // ✅ 1. Regel: 2-stellig schon belegt
        let hasTwoDigitBooked = bookings.some((b) => {
          let sNorm = normalizeDate(start);
          let eNorm = normalizeDate(end);

          let bsNorm = normalizeDate(b.start);
          let beNorm = normalizeDate(b.end);

          if (!(sNorm < beNorm && eNorm > bsNorm)) return false;

          let roomName = rooms[b.row];

          return !isThreeDigitRoom(roomName);
        });

        if (hasTwoDigitBooked) return true;

        // ✅ 2. Regel: Anfrage größer als freie 3-stellige Zimmer

        if (groupPlacement) {
          // 🔢 Anzahl angefragter DZ (inkl. DZ B!)
          let requestedDZ = groupPlacement.data
            .filter((d) => d.type.includes("DZ"))
            .reduce((sum, d) => sum + d.count, 0);

          // 🔢 freie 3-stellige DZ zählen
          let free3DigitDZ = rooms.filter((room, row) => {
            if (!isThreeDigitRoom(room)) return false;

            if (overlapDates(row, start, end, -1)) return false;

            return isAnyDZ(room);
          }).length;

          if (requestedDZ > free3DigitDZ) {
            return true; // 🔥 HIER greift deine neue Regel
          }
        }

        return false;
      }

      function canUseRoom(roomName, start, end, requestedType) {
        if (requestedType === "BLOCK") {
          return true; // ✅ immer erlaubt
        }

        let allowedTypes = getGuestOptions(roomName);

        // ✅ EZ LOGIK
        if (requestedType === "EZ") {
          let levelCheck = getCurrentEZLevel(start, end);

          if (!levelCheck) return false;

          return levelCheck(roomName);
        }

        // ✅ BALKON LOGIK
        if (requestedType === "DZ B") {
          let levelCheck = getCurrentDZBalconyLevel(start, end);

          // ✅ kein Balkon mehr → normale DZ erlauben
          if (!levelCheck) {
            return getCurrentDZLevel(start, end)?.(roomName);
          }

          // ✅ wichtig: hier NICHT mehr allowedTypes blockieren!
          return levelCheck(roomName);
        }
        // ❌ falsche Kategorie
        if (!allowedTypes.includes(requestedType)) {
          return false;
        }

        // ✅ DZ LOGIK (MIT PHASEN!)
        if (requestedType === "DZ") {
          let levelCheck = getCurrentDZLevel(start, end);

          if (!levelCheck) return false;

          return levelCheck(roomName);
        }

        if (requestedType === "3er") {
          let levelCheck = getCurrent3erLevel(start, end);

          if (!levelCheck) return false;

          return levelCheck(roomName);
        }

        if (requestedType === "4er") {
          let levelCheck = getCurrent4erLevel(start, end);

          if (!levelCheck) return false;

          return levelCheck(roomName);
        }
        // ✅ alles andere (3er, 4er, etc.)
        return true;
      }

      function getCurrentDZBalconyLevel(start, end) {
        let ignore = shouldIgnoreFloorSeparation(start, end);

        let levels = [];

        // ✅ Phase 1: 3-stellig bevorzugt
        if (!ignore) {
          levels.push(
            (r) => isThreeDigitRoom(r) && isDeluxeDZ(r),
            (r) => isThreeDigitRoom(r) && isMultiDZ(r) && getRoomType(r).includes("B")
          );
        }

        // ✅ Phase 2: ALLE
        levels.push(
          (r) => isDeluxeDZ(r),
          (r) => isMultiDZ(r) && getRoomType(r).includes("B")
        );

        for (let check of levels) {
          let found = rooms.some((room, row) => {
            if (!check(room)) return false;
            if (overlapDates(row, start, end, -1)) return false;
            return true;
          });

          if (found) return check;
        }

        return null;
      }

      function getCurrent4erLevel(start, end) {
        let ignore = shouldIgnoreFloorSeparation(start, end);

        let levels = [];

        if (!ignore) {
          levels.push((r) => isThreeDigitRoom(r) && isFourRoom(r));
        }

        levels.push((r) => isFourRoom(r));

        for (let check of levels) {
          let found = rooms.some((room, row) => {
            if (!check(room)) return false;
            if (overlapDates(row, start, end, -1)) return false;
            return true;
          });

          if (found) return check;
        }

        return null;
      }

      function isFourRoom(room) {
        let type = getRoomType(room);
        return type.includes("4");
      }

      function getCurrentEZLevel(start, end) {
        let ignore = shouldIgnoreFloorSeparation(start, end);

        let levels = [];

        if (!ignore) {
          levels.push(
            (r) => isThreeDigitRoom(r) && isNormalEZ(r),
            (r) => isThreeDigitRoom(r) && isSmallDZ(r),
            (r) => isThreeDigitRoom(r) && isDeluxeEZ(r),
            (r) => isThreeDigitRoom(r) && isSmallEZ(r)
          );
        }

        levels.push(
          (r) => isNormalEZ(r),
          (r) => isSmallDZ(r),
          (r) => isDeluxeEZ(r),
          (r) => isSmallEZ(r)
        );

        for (let check of levels) {
          let found = rooms.some((room, row) => {
            if (!check(room)) return false;
            if (overlapDates(row, start, end, -1)) return false;
            return true;
          });

          if (found) return check;
        }

        // ✅ fallback → DZ
        let dzCheck = getCurrentDZLevel(start, end);

        if (dzCheck) {
          return (room) => dzCheck(room);
        }

        return null;
      }

      function saveHistory() {
        // ✅ HIER GANZ AM ANFANG (das meintest du)
        try {
          if (isGroupCreating) return;

          const snapshot = {
            bookings: JSON.parse(JSON.stringify(bookings)),
            current: current.toISOString()
          };

          history.push(snapshot);

          // ✅ maximale Größe begrenzen
          if (history.length > 10) {
            history = history.slice(-10);
          }

          // ✅ speichern
          localStorage.setItem("hotel_history", JSON.stringify(history));
        } catch (e) {
          console.warn("⚠️ saveHistory Error – wird ignoriert", e);

          // ✅ NOTFALL: History komplett löschen
          history = [];
          localStorage.removeItem("hotel_history");
        }
      }

      async function undo() {
        if (history.length === 0) return;

        let last;

        do {
          last = history.pop();
        } while (history.length && JSON.stringify(last.bookings) === JSON.stringify(bookings));

        if (!last) return;

        bookings = last.bookings || [];
        current = last.current ? new Date(last.current) : new Date();

        render();

        // ✅ NEU: DB synchronisieren
        isUndoing = true;

        // IDs entfernen (wichtig für Insert)
        let cleanBookings = bookings.map((b) => {
          let copy = { ...b };
          delete copy.id;
          return copy;
        });

        // DB komplett neu setzen
        await supa.from("bookings").delete().neq("id", 0);
        await supa.from("bookings").insert(cleanBookings);

        isUndoing = false;
      }

      function hasAnyFree3DigitDZ(start, end) {
        return rooms.some((room, row) => {
          if (!isThreeDigitRoom(room)) return false;

          if (overlapDates(row, start, end, -1)) return false;

          // ✅ ALLE DZ-TYPEN berücksichtigen!
          return isAnyDZ(room);
        });
      }

      function changeWeek(n) {
        current.setDate(current.getDate() + 7 * n);
        render();
      }

      function overlapDates(row, start, end, ignoreIndex) {
        const s = normalizeDate(start);
        const e = normalizeDate(end);

        return bookings.some((b, i) => {
          if (i === ignoreIndex) return false;
          if (b.row !== row) return false;

          const bs = normalizeDate(b.start);
          const be = normalizeDate(b.end);

          return s < be && e > bs;
        });
      }

      function isPreferredEZRoom(roomName) {
        return roomName.includes("EZ") || roomName.includes("kl. DZ");
      }

      function getRoomType(roomName) {
        return roomName.split(" - ")[1];
      }

      async function assignRoom(row, options = {}) {
        let dry = options.dryRun === true;
        let tempOccupied = options.tempOccupied || new Set(); // 👈 NEU

        let item = groupPlacement.data
          .filter((d) => d.count > 0)

          .sort((a, b) => {
            let order = ["4er", "3er", "DZ B", "DZ", "EZ B", "EZ"];

          })[0];

        if (!item) return false;

          id: "tmp_" + Date.now() + "_" + Math.random()
        };

       
if (dry) {
  return temp;
}

bookings.push(temp);

return temp;

      }

      function isAnyDZ(room) {
        return isNormalDZ(room) || isDeluxeDZ(room) || isMultiDZ(room) || isSmallDZ(room);
      }

        if (isBlocked) {

        editIndex = null;

        newBookingRow = row;

        // ✅ BLOCK IMMER hinzufügen

        document.getElementById("f_end").value = endDate.toISOString().slice(0, 10);

        document.getElementById("f_comment").value = "";
        // ✅ GRUPPEN-DROPDOWN BEFÜLLEN
        let groupSelect = document.getElementById("f_group");
        groupSelect.innerHTML = "";

        // Standard
        let optNone = document.createElement("option");
        optNone.value = "";
        optNone.text = "– keine Gruppe –";
        groupSelect.appendChild(optNone);

        // vorhandene Gruppen dieser Woche
        let groups = getGroupsInWeek();

        groups.forEach((g) => {
          let opt = document.createElement("option");
          opt.value = g.id;
          opt.text = g.name;
          opt.dataset.color = g.color;
          groupSelect.appendChild(opt);
        });

        // neue Gruppe
        let optNew = document.createElement("option");
        optNew.value = "__new__";
        optNew.text = "➕ Neue Gruppe...";
        groupSelect.appendChild(optNew);

        groupSelect.onchange = (e) => {
          let selected = e.target.options[e.target.selectedIndex];

          if (selected.value === "__new__") {
            let name = prompt("Neue Gruppe eingeben:");

            if (!name) {
              groupSelect.value = "";
              return;
            }

            let opt = document.createElement("option");
            opt.value = name;
            opt.text = name;
            opt.dataset.color = "";
            groupSelect.add(opt);

            groupSelect.value = name;
          }

          let color = selected.dataset.color;

          groupSelect.style.background = color || "white";
          groupSelect.style.color =
            color === "yellow" || color === "orange" || color === "pink" || color === "lightgray" ? "black" : "white";
        };

        document.getElementById("bookingForm").style.display = "block";
        document.getElementById("f_name").focus();
      }

        console.log("SAVE START");

        if (!isEditAllowed()) return;

          return alert("Name fehlt");
        }

        if (end <= start) return alert("Abreise muss nach Anreise liegen");

        // ✅ NEUE BUCHUNG
        if (editIndex === null) {

          if (newBookingRow === null) {
            let bookingData = {
              start,
              end,
              name,
              company,
              price,
              comment,
              guests,

            };

          }

          // ✅ DIREKTBUCHUNG (DAS HAT GEFÄHLT!)
          let booking = {
            row: newBookingRow,
            start: start.toISOString(),
            end: end.toISOString(),
            name: name,
            company: company,
            price: price,
            comment: comment,
            guests: guests,

          };

          }

          closeForm();

          // ✅ sofort anzeigen (addBookingToDB macht das intern nochmal sauber)
          addBookingToDB(booking);

          return;

        // ✅ BESTEHENDE BUCHUNG ÄNDERN
        else {

          saveHistory();

          logChange(b.id, "end", b.end, end.toISOString());
          logChange(b.id, "name", b.name, name);
          logChange(b.id, "price", b.price, price);
          logChange(b.id, "comment", b.comment, comment);
          logChange(b.id, "guests", b.guests, guests);
          logChange(b.id, "breakfast", b.breakfast, breakfast);

          let color = b.color;

          // ✅ wenn Kategorie „B“
          if (guests.includes("B")) {
            color = "pink";
          }

          // ✅ optional: wieder zurück auf normal wenn nicht mehr B
          else if (b.color === "pink") {
            color = "yellow";
          }

          // ✅ 1. UI SOFORT updaten (kein Warten mehr)
          let newStart = start.toISOString();
          let newEnd = end.toISOString();

          b.start = newStart;
          b.end = newEnd;
          b.name = name;
          b.company = company;
          b.price = price;
          b.comment = comment;
          b.guests = guests;
          b.color = color;
          b.breakfast = breakfast;

          render(); // ✅ sofort sichtbar

          // ✅ 2. DB im Hintergrund updaten (NICHT await!)

          supa
            .from("bookings")
            .update({
              start: newStart,
              end: newEnd,
              name,
              company,
              price,
              comment,
              guests,
              breakfast,
              group_id: b.group_id
            })

            .eq("id", b.id)
            .then(({ error }) => {
              if (error) {
                console.error(error);
                alert("Fehler beim Speichern");
              }
            });
        }
        closeForm();
      }

      let singlePlacement = null;

      function startSinglePlacement(data) {
        window.balconyWarningShown = false;

        render();

      function getFreeDZLevels(start, end, onlyTwoDigit = false) {
        let normalFree = false;
        let deluxeFree = false;
        let multiFree = false;

        rooms.forEach((room, row) => {
          if (overlapDates(row, start, end, -1)) return;

          // ✅ NEU: nur 2-stellig berücksichtigen falls gewünscht
          if (onlyTwoDigit && isThreeDigitRoom(room)) return;

          if (isNormalDZ(room)) normalFree = true;
          else if (isDeluxeDZ(room)) deluxeFree = true;
          else if (isMultiDZ(room)) multiFree = true;
        });

        return {
          normalFree,
          deluxeFree,
          multiFree
        };
      }

      function isThreeDigitRoom(room) {
        let number = room.split(" - ")[0];
        return number.length === 3;
      }

      function isNormalEZ(room) {
        let type = getRoomType(room);

        return type.includes("EZ") && !type.includes("B") && !type.includes("kl");
      }

      function isDeluxeEZ(room) {
        let type = getRoomType(room);

        return type.includes("EZ B");
      }

      function isSmallEZ(room) {
        let type = getRoomType(room);

        return type.includes("kl. EZ");
      }

      function isNormalDZ(room) {
        let type = getRoomType(room);

        return (
          type.includes("DZ") &&
          !type.includes("B") &&
          !type.includes("3") &&
          !type.includes("4") &&
          !type.includes("kl")
        );
      }

      function isDeluxeDZ(room) {
        let type = getRoomType(room);

        return type.includes("DZ") && type.includes("B") && !type.includes("3") && !type.includes("4");
      }

      function isMultiDZ(room) {
        let type = getRoomType(room);

        return type.includes("3") || type.includes("4");
      }

      function isSmallDZ(room) {
        let type = getRoomType(room);

        return type.includes("kl. DZ");
      }

        let html = `
    <b>👥 Zimmerkategorie:</b>${b.guests || "-"}<br><br>
    <b>✏️ Name:</b>${b.name || "-"}<br><br>
    <b>🏢 Firma:</b>${b.company || "-"}<br><br>
    <b>📅 Anreise:</b>${start}<br>
    <b>📅 Abreise:</b>${end}<br><br>
    <b>💲 Preis:</b>${b.price || "-"}<br><br>
    <b>💬 Kommentar:</b>${b.comment || "-"}<br><br>
    <b>☕ Frühstück:</b>${b.breakfast !== false ? "Ja" : "Nein"}<br><br>


<b>🎨 Gruppe:</b>
${renderGroupBadge(groupsMap[b.group_id])}
<br><br>
<br><br>
    <b>💰 Bezahlt:</b>${b.paid ? "🟢" : "🔴"}<br>
    <b>🏨 Check-in:</b>${b.checkin ? "🟢" : "🔴"}
  `;

        document.getElementById("infoContent").innerHTML = html;
        document.getElementById("bookingInfo").style.display = "block";
      }

      function closeInfo() {
        document.getElementById("bookingInfo").style.display = "none";
      }

      function draw() {
        document.querySelectorAll(".booking").forEach((e) => e.remove());
        document.querySelectorAll(".booking-half").forEach((e) => e.remove());

        let weekStart = normalizeDate(startOfWeek(current));

        bookings.forEach((b, i) => {
          let bStart = normalizeDate(b.start);
          let bEnd = normalizeDate(b.end);

          let diffStart = Math.floor((bStart - weekStart) / (1000 * 60 * 60 * 24));
          let diffEnd = Math.floor((bEnd - weekStart) / (1000 * 60 * 60 * 24));

          // ✅ Spezialfall: endet genau am Wochenanfang → halben Tag anzeigen
          if (diffEnd <= 0) {
            let endsExactlyAtStart = diffEnd === 0;

            if (!endsExactlyAtStart) return;
          }
          if (diffStart >= 7) return;

          let visStart = Math.max(0, diffStart);
          let visEnd = Math.min(7, diffEnd);

          // ✅ WICHTIG
          let startsBeforeWeek = diffStart < 0;
          let endsAfterWeek = diffEnd >= 7;

          let row = document.querySelectorAll("tr")[b.row + 1];
          if (!row) return;

          let cell = row.children[visStart + 1];

          let d = document.createElement("div");
          d.className = "booking";

          if (b.guests === "BLOCK") {
            d.classList.add("block");
          }

          d.dataset.id = b.id;
          d.dataset.index = i;

          d.onclick = (e) => {
            if (f) {
              e.stopPropagation();

              if (selected.includes(i)) {
                selected = selected.filter((x) => x !== i);
              } else {
                selected.push(i);
              }

              render();
              return;
            }

            // ✅ Klick verzögern (für Doppelklick-Erkennung)

            if (e.detail === 2) return; // ✅ verhindert Klick bei Doppelklick

            clearTimeout(clickTimer);

            clickTimer = setTimeout(() => {
              openInfo(i);
            }, 200);
          };

          if (selected.includes(i)) {
            d.classList.add("selected");
          }

          let widthDays = visEnd - visStart;

          // ✅ Standardwerte

          let rowEl = document.querySelectorAll("tr")[b.row + 1];

          let cells = rowEl.querySelectorAll("td:not(.room)");

          let startCell = cells[visStart];

          let renderEnd = endsAfterWeek ? 7 : visEnd;
          let endCell = cells[renderEnd] || cells[cells.length - 1];

          let startRect = startCell.getBoundingClientRect();
          let endRect = endCell.getBoundingClientRect();

          let layer = rowEl.querySelector(".booking-layer");
          let layerRect = layer.getBoundingClientRect();

          let dayWidth = startRect.width;

          // ✅ HALBTAGS-KORREKTUR

          let left = startRect.left - layerRect.left + dayWidth / 2;

          if (diffStart < 0) {
            left -= dayWidth * 0.5;
          }

          // RIGHT
          let right = endRect.left - layerRect.left + dayWidth / 2;

          if (diffEnd >= 7) {
            right += dayWidth * 0.5;
          }

          // ✅ setzen

          const GAP = 4; // 👈 kannst du anpassen (2–6 ideal)

          d.style.left = left + GAP / 2 + "px";
          d.style.width = right - left - GAP + "px";

          // ✅ Wenn Buchung innerhalb der Woche endet → halben Checkout-Tag zeigen
          if (!endsAfterWeek) {
            let co = Math.floor((bEnd - weekStart) / (1000 * 60 * 60 * 24));

            // ✅ entscheidet OB ein halber Tag gezeigt wird
            let showHalf =
              (co >= 0 && co < 7) || // normal innerhalb Woche
              co === 7; // SPEC: Montag nächste Woche

            if (showHalf) {
              let rowEl = document.querySelectorAll("tr")[b.row + 1];

              // ✅ WO zeichnen
              let targetDay = co === 7 ? 6 : co;

              let coCell = rowEl.children[targetDay + 1];

              let halfDiv = document.createElement("div");
              halfDiv.className = "booking-half";

              halfDiv.style.left = "0%";
              halfDiv.style.width = "50%";
              halfDiv.style.background = b.color;
              halfDiv.style.opacity = "0.5";

              coCell.appendChild(halfDiv);
            }
          }

          let group = groupsMap[b.group_id];

          let color = group ? group.color : b.color;

          d.style.background = color;

          d.style.color =
            color == "yellow" || color == "turquoise" || color == "pink" || color == "orange" || color == "lightgray"
              ? "black"
              : "white";

          // ✅ FLAGS CONTAINER
          let flags = document.createElement("div");
          flags.className = "flags";

          if (b.guests === "BLOCK") {
            flags.style.display = "none";
          }

          // ✅ BEZAHLT (✔)
          let paid = document.createElement("div");
          paid.className = "flag ";
          paid.innerHTML = "✔";

          if (!b.paid) paid.classList.add("off");

          paid.onclick = async (e) => {
            if (isMobile) return;
            if (f) return;
            if (!isEditAllowed()) return;
            e.stopPropagation();

            let oldVal = b.paid;
            let newVal = !b.paid;

            // ✅ 1. SOFORT im UI setzen
            b.paid = newVal;
            render();

            // ✅ 2. async im Hintergrund speichern
            const { error } = await supa.from("bookings").update({ paid: newVal }).eq("id", b.id);

            if (error) {
              // ❌ rollback falls Fehler
              b.paid = oldVal;
              render();

              alert("Fehler beim Speichern");
              console.error(error);
            } else {
              // ✅ Logging danach
              await logChange(b.id, "paid", oldVal, newVal);
            }
          };

          // ✅ CHECK-IN (●)
          let check = document.createElement("div");
          check.className = "flag ";
          check.innerHTML = "●";

          if (!b.checkin) check.classList.add("off");

          check.onclick = async (e) => {
            if (isMobile) return;
            if (f) return;
            if (!isEditAllowed()) return;
            e.stopPropagation();

            let oldVal = b.checkin;
            let newVal = !b.checkin;

            // ✅ 1. sofort UI
            b.checkin = newVal;
            render();

            // ✅ 2. DB im Hintergrund
            const { error } = await supa.from("bookings").update({ checkin: newVal }).eq("id", b.id);

            if (error) {
              // ❌ rollback
              b.checkin = oldVal;
              render();

              alert("Fehler beim Speichern");
              console.error(error);
            } else {
              await logChange(b.id, "checkin", oldVal, newVal);
            }
          };

          flags.appendChild(paid);
          flags.appendChild(check);

          // ✅ TEXT
          let commentText = b.comment ? " - " + b.comment : "";
          let frText = b.breakfast === false ? " <span class='no-breakfast-icon'><span>☕</span></span>" : "";
          let companyText = b.company ? ` 🏢 ${b.company}` : "";
          let txt = document.createElement("span");

          txt.className = "text";
          txt.style.flex = 1;

          if (isMobile) {
            if (b.guests === "BLOCK") {
              txt.innerHTML = "🚫";
            } else {
              txt.innerHTML = "";
            }
          } else {
            if (b.guests === "BLOCK") {
              txt.innerHTML = "🚫 BLOCKIERT";
            } else {
              txt.innerHTML = `${b.guests} ${b.name || (group ? group.name : "")}${companyText}${frText}${commentText}`;
            }
          }

          let pr = document.createElement("span");
          pr.className = "price";

          if (!b.price) {
            pr.innerHTML = "";
          } else if (isNaN(b.price)) {
            pr.innerHTML = b.price; // Text (bez., Rg., etc.)
          } else {
            pr.innerHTML = b.price + "€"; // Zahl
          }

          let r = document.createElement("div");
          r.className = "handle right";
          r.onmousedown = (e) => {
            if (isMobile) return;
            if (f) return;
            e.stopPropagation();
            resize(e, i, 1);
          };

          let l = document.createElement("div");
          l.className = "handle left";

          l.onmousedown = (e) => {
            if (isMobile) return;
            if (f) return;

            e.stopPropagation();
            e.preventDefault();

            // ✅ DAS ist der entscheidende Fix:
            e.stopImmediatePropagation();

            drag = null;
            resizing = true;

            resize(e, i, -1);
          };

          // ✅ nur noch rechter Handle
          // ✅ DRAG HANDLE (neu)
          let dragHandle = document.createElement("div");

          dragHandle.className = "drag-handle";

          dragHandle.style.width = "10px";
          dragHandle.style.cursor = "grab";
          dragHandle.style.marginRight = "6px";
          dragHandle.style.background = "rgba(0,0,0,0.2)";
          dragHandle.style.borderRadius = "3px";

          dragHandle.innerHTML = "⋮⋮"; // kleine Griffpunkte
          dragHandle.style.fontSize = "12px";
          dragHandle.style.display = "flex";
          dragHandle.style.alignItems = "center";
          dragHandle.style.justifyContent = "center";

          // 👉 wichtig: damit Events funktionieren
          dragHandle.style.pointerEvents = "auto";

          // ✅ LEFT nur wenn Start in dieser Woche
          if (!startsBeforeWeek) {
            d.appendChild(l);
          }

          // ✅ RIGHT nur wenn Ende in dieser Woche
          if (!endsAfterWeek) {
            d.appendChild(r);
          }

          d.append(flags, dragHandle, txt, pr);

          // ✅ Drag aktivieren
          // ✅ DRAG START
          dragHandle.onmousedown = (e) => {
            let el = document.querySelector(`.booking[data-index='${i}']`);
            let b = bookings[i];

            let weekStart = normalizeDate(startOfWeek(current));
            let startDate = normalizeDate(b.start);

            let startDay = Math.floor((startDate - weekStart) / (1000 * 60 * 60 * 24));

            let layer = el.parentElement;
            let layerRect = layer.getBoundingClientRect();

            // ✅ echte Zeiten
            let start = new Date(b.start);
            let end = new Date(b.end);

            let rowEl = document.querySelectorAll("tr")[b.row + 1];

            // ✅ ZUERST cells definieren
            let cells = rowEl.querySelectorAll("td:not(.room)");

            let firstCellRect = cells[0].getBoundingClientRect();

            let dayWidth = firstCellRect.width;

            let offsetX = e.clientX - firstCellRect.left;

            let durationDays = (end - start) / (1000 * 60 * 60 * 24);

            // ✅ richtige Booking-Position!
            let elRect = el.getBoundingClientRect();

            let correctedLeft = elRect.left - layerRect.left;

            let diffStart = Math.round((start - weekStart) / (1000 * 60 * 60 * 24));

            if (diffStart < 0) {
              correctedLeft += diffStart * dayWidth;
            }

            el.style.width = durationDays * dayWidth + "px";
            el.style.left = correctedLeft + "px";

            // ✅ optional aber ok
            let closestDay = Math.round(offsetX / dayWidth);
            closestDay = Math.max(0, Math.min(6, closestDay));

            drag = {
              id: b.id,
              i: i,
              startDay: startDay,
              mouseStartX: e.clientX,
              offsetX: offsetX
            };

            resizing = false;
            document.body.style.userSelect = "none";
          };

          // ✅ Bearbeiten

          d.ondblclick = (e) => {
            if (isMobile) return;
            let b = bookings[i];

            // ✅ BLOCK: nicht editieren
            if (b.guests === "BLOCK") {
              e.stopPropagation();
              return;
            }

            clearTimeout(clickTimer);

            document.querySelector(".switch-wrapper").style.display = "none";

            document.getElementById("toggleGroup").checked = false;
            document.getElementById("singleForm").style.display = "block";
            document.getElementById("groupForm").style.display = "none";
            document.getElementById("f_breakfast").value = b.breakfast ? "true" : "false";
            document.querySelector(".switch-wrapper").style.display = "none";

            editIndex = i;

            let roomName = rooms[b.row];
            let opts = getGuestOptions(roomName);

            let select = document.getElementById("f_guests");
            select.innerHTML = "";

            opts.forEach((o) => {
              let opt = document.createElement("option");
              opt.value = o;
              opt.innerText = o;
              select.appendChild(opt);
            });

            select.value = b.guests || opts[0];

            document.getElementById("f_name").value = b.name || "";
            document.getElementById("f_start").value = b.start.slice(0, 10);
            document.getElementById("f_end").value = b.end.slice(0, 10);
            document.getElementById("f_price").value = b.price || "";
            document.getElementById("f_comment").value = b.comment || "";

            document.getElementById("formTitle").innerText = "Buchung ändern";

            document.getElementById("bookingForm").style.display = "block";
            document.getElementById("f_name").focus();
          };

          // ✅ Löschen
          d.oncontextmenu = async (e) => {
            if (isMobile) return;
            e.preventDefault();
            e.stopPropagation();

            drag = null;
            resizing = false;
            document.body.style.userSelect = "auto";

            if (f) return;
            if (!isEditAllowed()) return;

            if (!confirm("Löschen?")) return;

            const id = d.dataset.id; // ✅ HIER IST DER FIX!!!

            if (!id) {
              console.warn("Keine ID gefunden!");
              return;
            }

            isDeleting = true;
            saveHistory();

            // ✅ 1. DB löschen

            const { data, error } = await supa.from("bookings").delete().eq("id", id).select(); // ✅ GANZ WICHTIG

            console.log("DELETE RESULT:", data, error);

            if (error) {
              alert("Fehler beim Löschen");
              console.error(error);
              isDeleting = false;
              return;
            }

            // ✅ 2. lokal löschen
            bookings = bookings.filter((x) => String(x.id) !== String(id));

            render();

            // ✅ 3. Logging
            await supa.from("booking_logs").insert([
              {
                booking_id: id,
                user_id: (await supa.auth.getUser()).data.user.id,
                action: "delete",
                field: "booking",
                old_value: "exists",
                new_value: "deleted",
                room: rooms[b.row]
              }
            ]);

            isDeleting = false;
          };

          layer.appendChild(d);
        });
      }

      window.onmousemove = (e) => {
        if (drag && !resizing) {
          let el = document.querySelector(`.booking[data-index='${drag.i}']`);

          if (!el) {
            drag = null; // ✅ verhindert Hängenbleiben
            return;
          }

          let deltaX = e.clientX - drag.mouseStartX;

          el.style.transform = `translateX(${deltaX}px)`;
          el.style.transition = "none";
          el.style.pointerEvents = "none";
        }
      };

      // ✅ DRAG END (SNAP TO GRID)
      window.onmouseup = async (event) => {
        if (!drag && !resizing) {
          drag = null;
          resizing = false;
          document.body.style.userSelect = "auto";
          return;
        }
        document.body.style.cursor = "grabbing";

        let currentDrag = drag;

        if (!currentDrag && !resizing) {
          console.warn("mouseup ohne drag");
          return;
        }

        document.body.style.userSelect = "auto";
        // ✅ RESIZE ENDE
        if (resizing) {
          resizing = false;
          drag = null;
          document.body.style.userSelect = "auto";
          return;
        }

        if (!currentDrag) {
          drag = null;
          resizing = false;
          return;
        }

        let b = bookings.find((x) => x.id === currentDrag.id);

        let el = document.querySelector(`.booking[data-index='${currentDrag.i}']`);
        if (!el) return;

        let rowEl = document.querySelectorAll("tr")[b.row + 1];
        let cell = rowEl.querySelector("td:not(.room)");
        let cells = rowEl.querySelectorAll("td:not(.room)");
        let dayWidth = cell.getBoundingClientRect().width;

        let mouseX = event.clientX;

        let closestDay = 0;
        let closestDistance = Infinity;

        cells.forEach((cell, dayIndex) => {
          let rect = cell.getBoundingClientRect();
          let center = rect.left + rect.width / 2;

          let dist = Math.abs(mouseX - center);

          if (dist < closestDistance) {
            closestDistance = dist;
            closestDay = dayIndex;
          }
        });

        let moveDays = closestDay - currentDrag.startDay;

        let changed = false;
        let oldStart = b.start;
        let oldEnd = b.end;

        if (moveDays !== 0) {
          let baseStart = new Date(b.start);
          let baseEnd = new Date(b.end);

          // ✅ Dauer exakt berechnen (in ms!)
          let duration = baseEnd - baseStart;

          // ✅ neuen Start berechnen
          let newStart = new Date(baseStart);
          newStart.setDate(newStart.getDate() + moveDays);

          // ✅ Ende IMMER aus Dauer neu berechnen
          let newEnd = new Date(newStart.getTime() + duration);
          newStart.setHours(CHECKIN_HOUR, 0, 0, 0);
          newEnd.setHours(CHECKOUT_HOUR, 0, 0, 0);

          if (!overlapDates(b.row, newStart, newEnd, currentDrag.i)) {
            saveHistory();

            b.start = newStart.toISOString();
            b.end = newEnd.toISOString();

            changed = true;
          }
        }
        document.body.style.cursor = "default";
        render();

        el = document.querySelector(`.booking[data-index='${currentDrag.i}']`);
        if (el) {
          el.style.transform = "none";
          el.style.transition = "";
        }

        justDragged = true;
        setTimeout(() => (justDragged = false), 100);

        drag = null;
        resizing = false;
        document.body.style.userSelect = "auto";

        if (changed) {
          await logChange(b.id, "start", oldStart, b.start);
          await logChange(b.id, "end", oldEnd, b.end);

          if (!b.id || String(b.id).startsWith("tmp_")) {
            console.warn("Ungültige ID – Update abgebrochen:", b.id);
            return;
          }
          lastChangeTime = Date.now();
          const { data, error } = await supa
            .from("bookings")
            .update({
              start: b.start,
              end: b.end
            })
            .eq("id", Number(b.id))
            .select();

          if (error) {
            console.error("Update Fehler:", error);

            // rollback
            b.start = oldStart;
            b.end = oldEnd;
            render();

            return;
          }

          if (!data || data.length === 0) {
            console.warn("Kein Datensatz aktualisiert!");
          }

          // ✅ optional: DB-Daten zurück übernehmen
          if (data && data[0]) {
            bookings = bookings.map((x) => (x.id === currentDrag.id ? data[0] : x));
          }
        }
      };

      async function resize(e, i, dir) {
        if (!isEditAllowed()) return;

        if (e.button !== 0) return; // ✅ nur Linksklick erlaubt
        e.preventDefault();

        drag = null;
        resizing = true;

        let b = bookings[i];
        let weekStart = normalizeDate(startOfWeek(current));
        let baseStart = new Date(b.start);
        let baseEnd = new Date(b.end);
        let lastMouseX = e.clientX;

        if (dir === -1) {
          let base = normalizeDate(baseStart);
          let week = normalizeDate(weekStart);

          // ✅ nur blockieren wenn wirklich VOR der Woche
          if (base < week) {
            return;
          }
        }
        // ✅ sichtbaren Start berechnen
        let visibleStart = baseStart < weekStart ? new Date(weekStart) : new Date(baseStart);

        let rowEl = document.querySelectorAll("tr")[b.row + 1];
        let cell = rowEl.querySelector("td:not(.room)");

        let dayWidth = cell.getBoundingClientRect().width;

        let el = document.querySelector(`.booking[data-index='${i}']`);

        let rect = el.getBoundingClientRect();

        let layer = el.parentElement;
        let layerRect = layer.getBoundingClientRect();

        let resizeState = {
          mouseStartX: e.clientX,
          startWidth: rect.width,
          startLeft: rect.left - layerRect.left // ✅ RELATIV!
        };

        if (!el) return;

        const resizeMove = (ev) => {
          if (!resizing) return;

          lastMouseX = ev.clientX; // ✅ HIER!

          let deltaX = ev.clientX - resizeState.mouseStartX;

          el.style.transform = "none";

          if (dir === 1) {
            el.style.width = resizeState.startWidth + deltaX + "px";
          }

          if (dir === -1) {
            el.style.left = resizeState.startLeft + deltaX + "px";
            el.style.width = resizeState.startWidth - deltaX + "px";
          }
        };

        const resizeEnd = async (ev) => {
          saveHistory();

          resizing = false;
          drag = null;
          document.body.style.userSelect = "auto";

          let weekStart = normalizeDate(startOfWeek(current));

          let rowEl = document.querySelectorAll("tr")[b.row + 1];
          let cells = rowEl.querySelectorAll("td:not(.room)");

          let mouseX = lastMouseX;

          let closestSlot = 0;
          let closestDistance = Infinity;

          // ✅ 14 Slots berechnen (2 pro Tag)
          cells.forEach((cell, dayIndex) => {
            let rect = cell.getBoundingClientRect();

            for (let half = 0; half < 2; half++) {
              let center;

              if (half === 0) {
                center = rect.left + rect.width * 0.25;
              } else {
                center = rect.left + rect.width * 0.75;
              }

              let slotIndex = dayIndex * 2 + half;
              let distance = Math.abs(mouseX - center);

              if (distance < closestDistance) {
                closestDistance = distance;
                closestSlot = slotIndex;
              }
            }
          });

          let currentStartSlot = getSlotFromDate(b.start, weekStart, false);
          let currentEndSlot = getSlotFromDate(b.end, weekStart, true);

          // ✅ PARITÄT ZUERST (ganz wichtig!)
          if (dir === -1 && closestSlot % 2 === 1) {
            closestSlot--;
          }

          if (dir === 1 && closestSlot % 2 === 0) {
            closestSlot++;
          }

          // ✅ Mindestabstand erzwingen (JETZT, nicht vorher!)
          if (dir === -1 && currentEndSlot - closestSlot < 2) {
            closestSlot = currentEndSlot - 2;
          }

          if (dir === 1 && closestSlot - currentStartSlot < 2) {
            closestSlot = currentStartSlot + 2;
          }

          // ✅ PARITÄT NOCHMAL SICHERN (weil wir Slot verändert haben!)
          if (dir === -1 && closestSlot % 2 === 1) {
            closestSlot--;
          }

          if (dir === 1 && closestSlot % 2 === 0) {
            closestSlot++;
          }

          // ✅ CLAMP GANZ ZUM SCHLUSS
          closestSlot = Math.max(0, Math.min(13, closestSlot));

          if (dir === -1) {
            let newStart = new Date(weekStart);
            newStart.setDate(weekStart.getDate() + Math.floor(closestSlot / 2));

            // ✅ HIER setzen!
            newStart.setHours(CHECKIN_HOUR, 0, 0, 0);

            if (!overlapDates(b.row, newStart, baseEnd, i)) {
              let oldStart = b.start;

              b.start = newStart.toISOString();

              render();

              await logChange(b.id, "start", oldStart, b.start);
              await supa.from("bookings").update({ start: b.start }).eq("id", b.id);
            }
          }

          if (dir === 1) {
            let newEnd = new Date(weekStart);
            newEnd.setDate(weekStart.getDate() + Math.floor(closestSlot / 2));

            // ✅ HIER setzen!
            newEnd.setHours(CHECKOUT_HOUR, 0, 0, 0);

            if (!overlapDates(b.row, baseStart, newEnd, i)) {
              let oldEnd = b.end;

              b.end = newEnd.toISOString();

              render();

      stats.dz++;

      stats.guests += 4;
    }
  });

  return stats;
}

supa
  .channel("live-bookings")
  .on(
    "postgres_changes",
    { event: "*", schema: "public", table: "bookings" },
    (payload) => {
      if (
        isRestoring ||
        isUndoing ||
        isDeleting ||
        isDraggingUpdate ||

        Date.now() - lastChangeTime < 500
      ) {

  .subscribe();

function handleRealtimeUpdate(payload) {
  const { eventType, new: newRow, old: oldRow } = payload;

  if (eventType === "INSERT") {
    bookings.push({ ...newRow, row: Number(newRow.row) });
  }

  if (eventType === "UPDATE") {
    bookings = bookings.map((b) =>
      b.id === newRow.id ? { ...newRow, row: Number(newRow.row) } : b
    );
  }

  if (eventType === "DELETE") {
    bookings = bookings.filter((b) => b.id !== oldRow.id);
  }

  render();
}

      function overlapDatesSim(row, start, end, ignoreIndex, tempOccupied) {
        if (tempOccupied.has(row)) return true;

        return overlapDates(row, start, end, ignoreIndex);
      }

      function getCurrentDZLevelSim(start, end, tempOccupied) {
        let ignore = shouldIgnoreFloorSeparation(start, end);

        let levels = [];

        if (!ignore) {
          levels.push(
            (r) => isThreeDigitRoom(r) && isNormalDZ(r),
            (r) => isThreeDigitRoom(r) && isDeluxeDZ(r),
            (r) => isThreeDigitRoom(r) && isMultiDZ(r),
            (r) => isThreeDigitRoom(r) && isSmallDZ(r)
          );
        }

        levels.push(
          (r) => isNormalDZ(r),
          (r) => isDeluxeDZ(r),
          (r) => isMultiDZ(r),
          (r) => isSmallDZ(r)
        );

        for (let check of levels) {
          let found = rooms.some((room, row) => {
            if (!check(room)) return false;

            if (overlapDatesSim(row, start, end, -1, tempOccupied)) return false;

            return true;
          });

          if (found) return check;
        }

        return null;
      }

      function canUseRoomSim(roomName, start, end, type, tempOccupied, row) {
        if (type === "DZ") {
          let level = getCurrentDZLevelSim(start, end, tempOccupied);

          if (!level) return false;

          return level(roomName);
        }

        if (type === "EZ") {
          let level = getCurrentEZLevel(start, end);

          if (!level) return false;

          return level(roomName);
        }

        return canUseRoom(roomName, start, end, type);
      }

      function getOrderedRooms(start, end, type) {
        let list = [];

        if (type === "DZ") {
          let ignore = shouldIgnoreFloorSeparation(start, end);

          let phases = [];

          if (!ignore) {
            phases.push((r) => isThreeDigitRoom(r) && isNormalDZ(r));
            phases.push((r) => isThreeDigitRoom(r) && isDeluxeDZ(r));
            phases.push((r) => isThreeDigitRoom(r) && isMultiDZ(r));
            phases.push((r) => isThreeDigitRoom(r) && isSmallDZ(r));
          }

          phases.push((r) => isNormalDZ(r));
          phases.push((r) => isDeluxeDZ(r));
          phases.push((r) => isMultiDZ(r));
          phases.push((r) => isSmallDZ(r));

          phases.forEach((check) => {
            rooms.forEach((room, i) => {
              if (check(room)) list.push(i);
            });
          });

          return list;
        }

        if (type === "EZ") {
          let ignore = shouldIgnoreFloorSeparation(start, end);

          let phases = [];

          if (!ignore) {
            phases.push((r) => isThreeDigitRoom(r) && isNormalEZ(r));
            phases.push((r) => isThreeDigitRoom(r) && isSmallDZ(r));
            phases.push((r) => isThreeDigitRoom(r) && isDeluxeEZ(r));
            phases.push((r) => isThreeDigitRoom(r) && isSmallEZ(r));
          }

          phases.push((r) => isNormalEZ(r));
          phases.push((r) => isSmallDZ(r));
          phases.push((r) => isDeluxeEZ(r));
          phases.push((r) => isSmallEZ(r));

          phases.forEach((check) => {
            rooms.forEach((room, i) => {
              if (check(room)) list.push(i);
            });
          });

          return list;
        }

        return rooms.map((_, i) => i);
      }

      function getUsedColorsInRange(start, end) {
        let usedColors = new Set();

        let currentDate = normalizeDate(start);

        while (currentDate < end) {
          let weekStart = normalizeDate(startOfWeek(currentDate));
          let weekEnd = new Date(weekStart);
          weekEnd.setDate(weekStart.getDate() + 7);

          bookings.forEach((b) => {
            let group = groupsMap[b.group_id];
            if (!group) return;

            let s = new Date(b.start);
            let e = new Date(b.end);

            s.setHours(0, 0, 0, 0);
            e.setHours(0, 0, 0, 0);

            if (s < weekEnd && e > weekStart) {
              usedColors.add(group.color);
            }
          });

          currentDate.setDate(currentDate.getDate() + 7);
        }

        return usedColors;
      }

      function getGroupsInWeek() {
        let groups = [];

        let weekStart = normalizeDate(startOfWeek(current));
        let weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 7);

        bookings.forEach((b) => {
          let group = groupsMap[b.group_id];
          if (!group) return;

          let s = new Date(b.start);
          let e = new Date(b.end);

          s.setHours(0, 0, 0, 0);
          e.setHours(0, 0, 0, 0);

          if (s < weekEnd && e > weekStart) {
            if (!groups.find((g) => g.id === group.id)) {
              groups.push({
                id: group.id,
                name: group.name,
                color: group.color
              });
            }
          }
        });

        return groups;
      }

              case "start":

      async function autoPlaceGroup() {
  if (!groupPlacement || !groupPlacement.data) return;

  let { start, end } = groupPlacement;

  let tempOccupied = new Set();

  let order = ["4er", "3er", "DZ B", "DZ", "EZ B", "EZ"];

  let somethingPlaced = true;

  while (somethingPlaced && groupPlacement) {
    somethingPlaced = false;

    for (let type of order) {
      let item = groupPlacement.data.find((d) => d.type === type);

      if (!item || item.count <= 0) continue;

      for (let row = 0; row < rooms.length; row++) {
        if (tempOccupied.has(row)) continue;

        if (overlapDates(row, start, end, -1)) continue;

        let roomName = rooms[row];

        if (!canUseRoom(roomName, start, end, type)) continue;

        let booking = await assignRoom(row, {
          dryRun: false // ✅ WICHTIG!
        });

        if (booking) {
          tempOccupied.add(row);
          item.count--;
          somethingPlaced = true;
          break;
        }
      }
    }
  }

  render();
  updatePlacementBox();

  let done = groupPlacement && groupPlacement.data.every((d) => d.count === 0);

  if (done && groupPlacement) {
    await syncGroupToDB(); // ✅ NEU
    finishPlacement();
  }
}


      async function syncGroupToDB() {
  let tempBookings = bookings.filter(b =>
    String(b.id).startsWith("tmp_")
  );

  if (!tempBookings.length) return;

  let clean = tempBookings.map(b => {
    let copy = { ...b };
    delete copy.id;
    return copy;
  });

  isLocalInsert = true;

  const { data, error } = await supa
    .from("bookings")
    .insert(clean)
    .select();

  isLocalInsert = false;

  if (error) {
    console.error(error);
    alert("Fehler beim Speichern der Gruppe");
    return;
  }

  // ✅ TMP → echt ersetzen
  let realIndex = 0;

  for (let i = 0; i < bookings.length; i++) {
    if (String(bookings[i].id).startsWith("tmp_")) {
      if (data[realIndex]) {
        bookings[i] = data[realIndex];
        realIndex++;
      }
    }
  }

  render();
}

      function debounce(fn, delay) {
        let t;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...args), delay);
        };
      }

      let touchStartX = 0;
      let touchEndX = 0;

      const calendar = document.getElementById("calendar");

      calendar.addEventListener("touchstart", (e) => {
        touchStartX = e.changedTouches[0].screenX;
      });

      calendar.addEventListener("touchend", (e) => {
        touchEndX = e.changedTouches[0].screenX;
        handleSwipe();
      });

      function handleSwipe() {
        let diff = touchStartX - touchEndX;

        if (Math.abs(diff) < 150) return;

        if (diff > 0) {
          changeWeek(1);
        } else {
          changeWeek(-1);
        }
      }

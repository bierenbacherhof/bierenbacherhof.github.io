    function findGroupByColorInWeek(color) {
      let weekStart = normalizeDate(startOfWeek(current));
      let weekEnd = new Date(weekStart);
      weekEnd.setDate(weekStart.getDate() + 7);

      for (let b of bookings) {
        if (!b.group_id) continue;

        let group = groupsMap[b.group_id];
        if (!group) continue;

        let s = normalizeDate(b.start);
        let e = normalizeDate(b.end);

        let overlaps = s < weekEnd && e > weekStart;

        if (overlaps && group.color === color) {
          return group;
        }
      }

      return null;
    }

    function calculateGroupDates(groupBookings) {
      if (!groupBookings.length) {
        return {
          start: null,
          end: null,
          startNote: "",
          endNote: ""
        };
      }

      let startCount = {};
      let endCount = {};

      function dateKey(d) {
        let dt = normalizeDate(d);
        return (
          dt.getFullYear() +
          "-" +
          String(dt.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(dt.getDate()).padStart(2, "0")
        );
      }

      groupBookings.forEach((b) => {
        let s = dateKey(b.start);
        let e = dateKey(b.end);

        startCount[s] = (startCount[s] || 0) + 1;
        endCount[e] = (endCount[e] || 0) + 1;
      });

      function getMostCommon(map, mode = "start") {
        let max = 0;
        let candidates = [];

        for (let key in map) {
          let count = map[key];

          if (count > max) {
            max = count;
            candidates = [key];
          } else if (count === max) {
            candidates.push(key);
          }
        }

        // ✅ Gleichstand behandeln
        if (candidates.length > 1) {
          if (mode === "start") {
            // frühestes Datum
            return candidates.sort()[0];
          } else {
            // spätestes Datum
            return candidates.sort()[candidates.length - 1];
          }
        }

        return candidates[0];
      }
      let mainStart = getMostCommon(startCount, "start");
      let mainEnd = getMostCommon(endCount, "end");

      let startDates = Object.keys(startCount);
      let endDates = Object.keys(endCount);

      let startNote = "";
      let endNote = "";

      if (startDates.some((d) => d < mainStart)) {
        startNote += " (teilw. früher)";
      }
      if (startDates.some((d) => d > mainStart)) {
        startNote += " (teilw. später)";
      }

      if (endDates.some((d) => d < mainEnd)) {
        endNote += " (teilw. früher)";
      }
      if (endDates.some((d) => d > mainEnd)) {
        endNote += " (teilw. später)";
      }

      return {
        start: mainStart,
        end: mainEnd,
        startNote,
        endNote
      };
    }

    function calculateGroupStats(data, mode = "input") {
      let stats = {
        ez: 0,
        dz: 0,
        er3: 0,
        er4: 0,
        guests: 0
      };

      if (mode === "input") {
        data.forEach((d) => {
          let type = d.type;
          let count = Number(d.count) || 0;

          applyStats(stats, type, count);
        });
      }

      if (mode === "bookings") {
        bookings.forEach((b) => {
          if (b.group_id !== data) return;

          let type = b.guests;

          applyStats(stats, type, 1);
        });
      }

      return stats;
    }

    function applyStats(stats, type, count) {
      if (type === "EZ" || type === "EZ B") {
        stats.ez += count;
        stats.guests += count;
      } else if (type === "DZ" || type === "DZ B") {
        stats.dz += count;
        stats.guests += count * 2;
      } else if (type === "3er") {
        stats.er3 += count;
        stats.guests += count * 3;
      } else if (type === "4er") {
        stats.er4 += count;
        stats.guests += count * 4;
      }
    }

      const g = groupsMap[groupId];

      if (
        g.count_ez === stats.ez &&
        g.count_dz === stats.dz &&
        g.count_3er === stats.er3 &&
        g.count_4er === stats.er4 &&
        g.guests_total === stats.guests
      ) {
        return; // nichts geändert
      }

      const { error } = await supa
        .from("groups")
        .update({
          count_ez: stats.ez,
          count_dz: stats.dz,
          count_3er: stats.er3,
          count_4er: stats.er4,
          guests_total: stats.guests
        })
        .eq("id", groupId);

      if (error) {
        console.error("Fehler beim Aktualisieren der Gruppen-Stats:", error);
      }

      groupsMap[groupId] = {
        ...groupsMap[groupId],
        count_ez: stats.ez,
        count_dz: stats.dz,
        count_3er: stats.er3,
        count_4er: stats.er4,
        guests_total: stats.guests
      };
    }

    function sanitizeFileName(name) {
      return name
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-zA-Z0-9.\-_]/g, "_");
    }

    async function handleFiles(files, groupId) {
      for (let file of files) {
        let cleanName = sanitizeFileName(file.name);
        let filePath = `${groupId}/${Date.now()}_${cleanName}`;

        const { data: uploadData, error: uploadError } = await supa.storage
          .from("group-files")
          .upload(filePath, file);

        if (uploadError) {
          console.error("Upload Fehler:", uploadError);
          continue;
        }

        const { data: urlData, error: urlError } = await supa.storage
          .from("group-files")
          .createSignedUrl(filePath, 60 * 60);

        if (urlError) {
          console.error("Signed URL Fehler:", urlError);
          continue;
        }

        let url = urlData.signedUrl;

        await supa.from("group_files").insert([
          {
            group_id: groupId,
            name: file.name,
            url: url
          }
        ]);
      }

      openGroupInfo(groupId);
    }

        user_id: user?.id || null
      };

      if (extra.start) insertObj.start = extra.start.toISOString().slice(0, 10);
      if (extra.end) insertObj.end = extra.end.toISOString().slice(0, 10);

      if (extra.stats) {
        insertObj.count_ez = extra.stats.ez;
        insertObj.count_dz = extra.stats.dz;
        insertObj.count_3er = extra.stats.er3;
        insertObj.count_4er = extra.stats.er4;
        insertObj.guests_total = extra.stats.guests;

      const { data, error } = await supa.from("groups").insert([insertObj]).select().single();

      if (error) {
        console.error(error);
        alert("Gruppe konnte nicht erstellt werden");
        return null;

      groupsMap[data.id] = data;

    function getUsedColorsInWeek() {
      let usedColors = new Set();

      let weekStart = normalizeDate(startOfWeek(current));
      let weekEnd = new Date(weekStart);

      bookings.forEach((b) => {
        let group = groupsMap[b.group_id];
        if (!group) return;

        let s = normalizeDate(b.start);
        let e = normalizeDate(b.end);

        if (s < weekEnd && e > weekStart) {
          usedColors.add(group.color);
        }
      });

      return usedColors;
    }

    function handleRealtimeUpdate(payload) {
      const { eventType, new: newRow, old: oldRow } = payload;

      if (eventType === "INSERT") {
        bookings.push({ ...newRow, row: Number(newRow.row) });
      }

      if (eventType === "UPDATE") {
        bookings = bookings.map((b) => (b.id == newRow.id ? { ...newRow, row: Number(newRow.row) } : b));
      }

      if (eventType === "DELETE") {
        bookings = bookings.filter((b) => b.id !== oldRow.id);
      }

      render();

      drawLegend();

    function getUsedColorsInRange(start, end) {
      let usedColors = new Set();

      let currentDate = normalizeDate(start);

      while (currentDate < end) {
        let weekStart = normalizeDate(startOfWeek(currentDate));
        let weekEnd = new Date(weekStart);
        weekEnd.setDate(weekStart.getDate() + 7);

        bookings.forEach((b) => {
          let group = groupsMap[b.group_id];
          if (!group) return;

          let s = normalizeDate(b.start);
          let e = normalizeDate(b.end);

          if (s < weekEnd && e > weekStart) {
            usedColors.add(group.color);
          }
        });

        currentDate.setDate(currentDate.getDate() + 7);
      }

      return usedColors;
    }

    function getGroupsInWeek() {
      let result = [];
      let seen = new Set();

      let weekStart = normalizeDate(startOfWeek(current));
      let weekEnd = new Date(weekStart);
      weekEnd.setDate(weekStart.getDate() + 7);

      bookings.forEach((b) => {
        if (!b.group_id) return;

        if (seen.has(b.group_id)) return;

        let s = normalizeDate(b.start);
        let e = normalizeDate(b.end);

        if (s < weekEnd && e > weekStart) {
          let g = groupsMap[b.group_id];

          if (g) {
            result.push({
              id: g.id,
              name: g.name,
              color: g.color
            });

            seen.add(b.group_id);
          }
        }
      });

      return result;
    }

      }

      let html = "";

      for (let i = 0; i < logs.length; i++) {
        let log = logs[i];
        let next = logs[i + 1];

        let userName = userMap[log.user_id] || "Unbekannt";

        let dt = new Date(log.created_at + "Z");

        let time = new Intl.DateTimeFormat("de-DE", {
          timeZone: "Europe/Berlin",
          day: "2-digit",
          month: "2-digit",
          year: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(dt);

        let text = "";
        let icon = "✏️";

        if (
          next &&
          ((log.field === "start" && next.field === "end") || (log.field === "end" && next.field === "start")) &&
          log.user_id === next.user_id &&
          Math.abs(new Date(log.created_at) - new Date(next.created_at)) < 3000
        ) {
          let startLog = log.field === "start" ? log : next;
          let endLog = log.field === "end" ? log : next;

          icon = "📅";

          text = `
        <b>Buchung verschoben</b><br>
        (${formatDate(startLog.old_value)}–${formatDate(endLog.old_value)}
        ➡️
        ${formatDate(startLog.new_value)}–${formatDate(endLog.new_value)})
      `;

          i++;
        } else {
          switch ((log.field || "").trim().toLowerCase()) {
            case "paid":
              icon = "💰";
              text = log.new_value === "true" ? "als <b>bezahlt</b> markiert" : "<b>Bezahlt</b> entfernt";
              break;

            case "checkin":
              icon = "🏨";
              text = log.new_value === "true" ? "<b>Check-in durchgeführt</b>" : "<b>Check-in entfernt</b>";
              break;

            case "start":
              icon = "📅";
              text = `Anreise geändert (${formatDate(log.old_value)} ➡️ ${formatDate(log.new_value)})`;
              break;

            case "end":
              icon = "📅";
              text = `Abreise geändert (${formatDate(log.old_value)} ➡️ ${formatDate(log.new_value)})`;
              break;

            case "room":
              icon = "🔁";
              text = `Zimmer gewechselt (${log.old_value} ➡️ ${log.new_value})`;
              break;

            case "booking":
              if (log.new_value === "created") {
                icon = "➕";
                text = "<b>Buchung erstellt</b>";
              } else if (log.new_value === "deleted") {
                icon = "🗑️";
                text = "<b>Buchung gelöscht</b>";
              }
              break;

            default:
              text = `${log.field}: ${log.old_value} ➡️ ${log.new_value}`;
          }
        }

        html += `
      <div style="margin-bottom:8px; padding:4px; border-bottom:1px solid #eee;">
        <small>
          <b>${userName}</b> (${time})<br>
          ${icon} ${text}
        </small>
      </div>
    `;
      }

      box.innerHTML = html;
    }

    const calendar = document.getElementById("calendar");
    const bg = document.getElementById("swipeBackground");

    const SWIPE_EDGE_WIDTH = 80;

    calendar.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;

      isSwiping = false;

      let isAtEdge = startX < SWIPE_EDGE_WIDTH || startX > window.innerWidth - SWIPE_EDGE_WIDTH;
      if (!isAtEdge) {
        return;
      }

      calendar.style.transition = "none";
    });

    calendar.addEventListener("touchmove", (e) => {
      let currentX = e.touches[0].clientX;
      let currentY = e.touches[0].clientY;

      let diffX = currentX - startX;
      let diffY = currentY - startY;

      if (Math.abs(diffX) < 15) return;

      if (!isSwiping) {
        if (Math.abs(diffY) > Math.abs(diffX)) return;

        isSwiping = true;
        calendar.style.transition = "none";
      }

      if (!isSwiping) return;

      calendar.style.transform = `translateX(${diffX}px) translateZ(0)`;

      let width = window.innerWidth;
      let progress = Math.min(Math.abs(diffX) / width, 1);

      if (diffX < 0) {
        bg.innerHTML = `<span style="
      position:absolute;
      left:${width - Math.abs(diffX)}px;
      font-size:40px;
      font-weight:bold;
    ">Nächste<br>Woche</span>`;
      } else {
        bg.innerHTML = `<span style="
      position:absolute;
      right:${width - Math.abs(diffX)}px;
      font-size:40px;
      font-weight:bold;
    ">Vorherige<br>Woche</span>`;
      }
    });

    calendar.addEventListener("touchend", () => {
      if (!isSwiping) return;
      isSwiping = false;

      let transform = calendar.style.transform;
      let diff = 0;

      if (transform.includes("translateX")) {
        diff = parseFloat(transform.replace(/translateX\(([-0-9.]+)px\)/, "$1"));
      }

      let threshold = 350;

      calendar.style.transition = "transform 0.2s ease-out";

      if (diff < -threshold) {
        calendar.style.transform = "translateX(-100%)";

        setTimeout(() => {
          changeWeek(1);
          resetCalendarPosition();
          bg.innerHTML = "";
        }, 200);
      } else if (diff > threshold) {
        calendar.style.transform = "translateX(100%)";

        setTimeout(() => {
          changeWeek(-1);
          resetCalendarPosition();
          bg.innerHTML = "";
        }, 200);
      } else {
        calendar.style.transform = "translateX(0)";
        bg.innerHTML = "";
      }
    });

        document.getElementById("bookingInfo").style.display === "block" ||
        document.getElementById("logOverview").style.display === "block" ||
        document.getElementById("backupList").style.display === "block" ||
        document.getElementById("groupInfoBox").style.display === "block";

      if (!overlayOpen) return;

      if (e.target.closest(".overlay-box")) return;

      const info = document.getElementById("bookingInfo");
      const form = document.getElementById("bookingForm");
      const backup = document.getElementById("backupList");
      const log = document.getElementById("logOverview");
      const overlay = document.getElementById("overlay");
      const groupBox = document.getElementById("groupInfoBox");

      let blocked = false;

      if (info && info.style.display === "block") {
        if (!info.contains(e.target)) {
          closeInfo();
          blocked = true;
        }
      }

      if (form && form.style.display === "block") {
        if (!form.contains(e.target)) {
          closeForm();
          blocked = true;
        }
      }

      if (backup && backup.style.display === "block") {
        if (!backup.contains(e.target)) {
          backup.style.display = "none";
          overlay.style.display = "none";
          blocked = true;
        }
      }

      if (log && log.style.display === "block") {
        if (!log.contains(e.target)) {
          log.style.display = "none";
          overlay.style.display = "none";
          blocked = true;
        }
      }

      if (groupBox && groupBox.style.display === "block") {
        if (!groupBox.contains(e.target)) {
          closeGroupInfo();
          blocked = true;
        }
      }

      if (blocked) {
        blockNextClick = true;

        return;
      }
    }
    document.getElementById("datePicker").addEventListener("change", async (e) => {
      const selectedDate = new Date(e.target.value);

      current = startOfWeek(selectedDate);

      groupPlacement = null;
      singlePlacement = null;
      await loadUserRole();
      document.getElementById("placementBox")?.remove();

      render();
    });

    if (!isMobile) {
      document.addEventListener("mousedown", handleGlobalClose);
    } else {
      document.addEventListener("touchstart", handleGlobalClose);
    }

    document.addEventListener(
      "click",
      (e) => {
        if (blockNextClick) {
          e.preventDefault();
          e.stopPropagation();
          e.stopImmediatePropagation();

          blockNextClick = false;

          return false;
        }
      },
      true
    );

    window.addEventListener("load", () => {
      const el = document.getElementById("datePickerWrapper");

      if (el) {
        el.style.display = "inline-block";
      }
    });

    requestAnimationFrame(updateStickyPositions);
  </script>
</body>

</html>
